# Lychee link checker config
# https://lychee.cli.rs/usage/config/

# Cache results for a day to avoid hammering external servers on every PR.
cache = true
max_cache_age = "1d"

# Reasonable defaults for a docs site.
max_concurrency = 8
max_redirects = 5
timeout = 20
retry_wait_time = 2
no_progress = true
verbose = "info"

# Allow common 4xx codes that aren't real failures.
accept = [
    "200..=299",
    "403", # GitHub anti-bot — content exists, just gated
    "429", # Rate limited — link is fine
]

# Skip private / internal / placeholder URLs.
exclude = [
    # Localhost references in examples
    "^https?://localhost",
    "^https?://127\\.0\\.0\\.1",
    "^http://localhost:\\d+",
    # Example domain in tutorials
    "^https?://api\\.example\\.com",
    "^https?://.*\\.corp\\.com",
    # GitHub editor links — generated by mkdocs material, not real URLs
    "^https://github\\.com/.+/edit/",
    # The site's own canonical (it's a build artifact)
    "^https://docs\\.jarvy\\.dev",
]

# Be patient with rate-limited domains.
exclude_link_local = true
exclude_loopback = true
# `exclude_mail` was removed in lychee 0.22 — the inverse `include_mail`
# now controls this behavior. Default is to skip mailtos, so simply
# omitting the directive matches the prior `exclude_mail = true`.
include_mail = false
exclude_path = [
    "site/",
    "target/",
    "node_modules/",
]
