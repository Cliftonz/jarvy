name: Fuzz Testing

on:
  # Fuzz testing is intentionally NOT triggered on push or pull_request.
  # Fuzzers find bugs over hours of execution, not per-commit; running a
  # 60s fuzz on every push burns CI minutes without finding meaningful
  # regressions. Engineers run `cargo fuzz` locally during investigation;
  # the weekly schedule below covers continuous coverage with corpus
  # persistence; workflow_dispatch covers ad-hoc deep runs.
  schedule:
    # Run weekly fuzz testing (Sunday at 2 AM UTC)
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: 'Fuzz duration in seconds'
        required: false
        default: '60'

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # The previous fuzz-pr job (60s per-PR/per-push run) was removed when
  # the on: triggers were tightened. Quick-fuzz capability is preserved
  # via workflow_dispatch with a small fuzz_duration input.
  fuzz-scheduled:
    name: Extended Fuzz (Scheduled)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_config_parser
          - fuzz_version_parser
          - fuzz_toml_input
          - fuzz_tool_spec
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Download existing corpus
        uses: actions/download-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}
        continue-on-error: true

      - name: Run fuzz target (extended)
        run: |
          cd fuzz
          DURATION=${{ github.event.inputs.fuzz_duration || '28800' }}
          echo "Running fuzz target for ${DURATION} seconds..."
          cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=${DURATION}
        continue-on-error: true

      - name: Upload corpus
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}
          retention-days: 90

      - name: Upload crash artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/
          retention-days: 90

      - name: Create issue on crash
        if: failure()
        uses: actions/github-script@v7
        with:
          # Body assembled via array.join('\n') so every line stays
          # within the YAML block scalar's indent. The previous
          # multi-line backtick template literal had lines starting in
          # column 1 (e.g. "**Target:**"), which terminated the YAML
          # scalar early on stricter parsers (Python yaml, OSSF
          # Scorecard's static-analysis pre-pass) — GitHub Actions
          # itself accepted it but Scorecard's SAST / Dangerous-Workflow /
          # Pinned-Dependencies / Token-Permissions / Packaging checks
          # all returned -1 with "could not parse as YAML: yaml: line
          # 102: did not find expected alphabetic or numeric character".
          script: |
            const fs = require('fs');
            const artifactPath = 'fuzz/artifacts/${{ matrix.target }}';

            if (fs.existsSync(artifactPath)) {
              const crashes = fs.readdirSync(artifactPath);
              if (crashes.length > 0) {
                const runUrl = context.serverUrl + '/' + context.repo.owner +
                  '/' + context.repo.repo + '/actions/runs/' + context.runId;
                const bodyLines = [
                  '## Fuzz Testing Crash Report',
                  '',
                  '**Target:** `${{ matrix.target }}`',
                  '**Workflow Run:** ' + runUrl,
                  '',
                  '### Crashes Found',
                  ...crashes.map(c => '- `' + c + '`'),
                  '',
                  '### Next Steps',
                  '1. Download the crash artifacts from the workflow run',
                  '2. Reproduce locally with `cargo +nightly fuzz run ${{ matrix.target }} <crash_input>`',
                  '3. Fix the issue and add a regression test',
                  '',
                  '/label bug fuzz',
                ];
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '[Fuzz] Crash found in ${{ matrix.target }}',
                  body: bodyLines.join('\n'),
                  labels: ['bug', 'fuzz'],
                });
              }
            }
        continue-on-error: true
