name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material + social-card system deps
        # mkdocs-material's social-card plugin (mkdocs.yml has it via the
        # `material` theme bundle) requires cairosvg + Pillow at runtime
        # to rasterize the social images. Without these, `mkdocs build
        # --strict` fails with `ModuleNotFoundError: No module named
        # 'cairosvg'` / 'PIL'. cairosvg also needs the libcairo2 system
        # package which ubuntu-latest already ships.
        run: pip install "mkdocs-material[imaging]" cairosvg Pillow

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
