name: Deploy Docs

# Versioned docs deployment via mike. On every release tag, the docs at that
# tag are deployed to gh-pages under that version label, and the "latest"
# alias points to the new version. Workflow_dispatch with input lets us
# rebuild any version on demand.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.2.3 or "dev"). Leave blank to derive from current ref.'
        required: false
      set_latest:
        description: 'Update the "latest" alias to point at this version'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # mike needs gh-pages history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-mkdocs

      - name: Install MkDocs Material + mike
        run: pip install "mkdocs-material[imaging]" cairosvg Pillow mike

      - name: Configure git for mike
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build jarvy binary (for auto-gen pages)
        run: cargo build --bin jarvy --release

      - name: Generate auto-built docs pages
        env:
          JARVY_BIN: ${{ github.workspace }}/target/release/jarvy
        run: bash scripts/gen-docs.sh

      - name: Determine version label
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
              VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              VERSION="${GITHUB_REF#refs/tags/}"
          else
              VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Strict build check
        run: mkdocs build --strict

      - name: Deploy with mike
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SET_LATEST: ${{ inputs.set_latest != 'false' }}
        run: |
          if [[ "$SET_LATEST" == "true" ]]; then
              mike deploy --push --update-aliases "$VERSION" latest
              mike set-default --push latest
          else
              mike deploy --push "$VERSION"
          fi

      - name: Summary
        run: |
          echo "## Deployed docs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${{ steps.version.outputs.VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://docs.jarvy.dev/${{ steps.version.outputs.VERSION }}/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest alias:** ${{ inputs.set_latest != 'false' }}" >> "$GITHUB_STEP_SUMMARY"
