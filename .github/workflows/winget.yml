name: Publish to WinGet

on:
  # workflow_dispatch ONLY. winget-releaser pushes a PR to update an
  # *existing* manifest; it cannot create a brand-new package
  # registration in microsoft/winget-pkgs. First-time submission for
  # Jarvy requires a manual `wingetcreate new --urls <msi-url>` followed
  # by a hand-reviewed PR. Once that's merged and the package
  # `Jarvy.Jarvy` exists in winget-pkgs, change the trigger back to
  # `release: published` so subsequent versions auto-update via this
  # workflow.
  #
  # Previously this workflow was triggered on `release: published` AND
  # was scaffolded with the wrong identifier (`Benji377.Tooka`) and
  # fork-user (`Benji377`) from a template that was never customized
  # for Jarvy. Every release fired the action and it failed with
  # "Package Jarvy.Jarvy does not exist".
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish (e.g. v0.0.3)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          # TODO: replace with the actual published winget identifier
          # once the package is registered. Convention is
          # Publisher.Package; for Jarvy the conventional value is
          # Jarvy.Jarvy. Update if the publisher namespace ends up
          # being `Cliftonz` or similar.
          identifier: Jarvy.Jarvy
          # TODO: replace with the GitHub user/org that holds the fork
          # of microsoft/winget-pkgs. Likely `Cliftonz` once the
          # fork exists.
          fork-user: Cliftonz
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGETCREATE_TOKEN }}
          release-tag: ${{ inputs.release-tag }}