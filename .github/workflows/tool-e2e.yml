name: Tools E2E

on:
  # Tools E2E exercises the full multi-OS install matrix and was
  # burning ~13 min × N pushes/day across mac+win+6-distro-linux.
  # Restrict to PRs that actually touch the tools registry / install
  # scripts / tools-related tests (everything else can't regress this
  # surface). Release tags still run the full matrix as the canonical
  # post-merge integration check. workflow_dispatch covers ad-hoc runs.
  pull_request:
    branches: [main]
    paths:
      - 'src/tools/**'
      - 'crates/jarvy-templates/**'
      - 'tests/cli_*.rs'
      - 'tests/e2e_*.rs'
      - 'tests/tools_*.rs'
      - 'dist/scripts/install.*'
      - 'Cargo.toml'
      - '.github/workflows/tool-e2e.yml'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tools-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-testcontainers:
    name: Linux (Testcontainers - ${{ matrix.pm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pm: [apt, dnf, yum, zypper, pacman, apk]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Install stable Rust toolchain
      - uses: dtolnay/rust-toolchain@stable

      # Speed up builds by caching Cargo/target
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # Build the jarvy binary used by tests; your tests read JARVY_BIN
      - name: Build jarvy
        run: cargo build --release --bin jarvy

      # Run the Testcontainers-based matrix test (spins up multiple distros)
      - name: Run Test Containers tests
        env:
          JARVY_BIN: target/release/jarvy
          PACKAGE_MANAGER: ${{ matrix.pm }}
        run: cargo test --tests -- --nocapture

  native-host:
    name: Native host (brew on macOS, winget on Windows)
    # macOS minutes are $0.062/min (10x Linux) and Windows is $0.01/min.
    # PR-time native-host runs were the second-largest macOS consumer
    # behind release.yml. PRs get Linux-only (linux-testcontainers above);
    # native-host fires on release tags + workflow_dispatch so cross-OS
    # install verification still gates the canonical artifact builds.
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build jarvy
        run: cargo build --release --bin jarvy

      # Windows: ensure winget is ready, then run the host harness
      - name: Run host tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget --info
          winget source update
          # Your jarvy tool should add --accept-* flags when calling winget
          $env:JARVY_BIN="${{ github.workspace }}\target\release\jarvy.exe"
          cargo test --tests -- --nocapture

      # macOS: brew is available on the hosted runner; run the host harness
      - name: Run host tests (macOS)
        if: runner.os == 'macOS'
        run: |
          brew --version || true
          brew update || true
          JARVY_BIN=target/release/jarvy cargo test --tests -- --nocapture