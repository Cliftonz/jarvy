name: Helm Chart CI

# PR-time validation for the jarvy-telemetry-forwarder chart and its
# release workflow. The pipeline shipped with chart 0.1.0 had three
# bugs that surfaced only at release time (tag-verify gotcha, default-
# render fail, cosign UNAUTHORIZED). This workflow catches each of
# them on PR before they merge — none of those three regressions
# should ever ship again.
on:
  pull_request:
    paths:
      - 'dist/helm/jarvy-telemetry-forwarder/**'
      - '.github/workflows/helm-release.yml'
      - '.github/workflows/helm-chart-ci.yml'
      - '.github/actions/verify-signed-tag/**'
  push:
    branches: [main]
    paths:
      - 'dist/helm/jarvy-telemetry-forwarder/**'
      - '.github/workflows/helm-release.yml'
      - '.github/actions/verify-signed-tag/**'

permissions:
  contents: read

env:
  CHART_DIR: dist/helm/jarvy-telemetry-forwarder

jobs:
  lint-and-render:
    name: Lint + matrix render + manifest validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: default
            args: ""
          - name: shared-gateway
            args: >-
              --set gatewayApi.gateway.create=false
              --set gatewayApi.httpRoute.parentRefs[0].name=shared-gw
              --set gatewayApi.httpRoute.parentRefs[0].namespace=networking
              --set gatewayApi.httpRoute.parentRefs[0].sectionName=https
          - name: secrets-inline
            args: >-
              --set secrets.strategy=inline
              --set secrets.inline.acceptRisk=true
              --set secrets.inline.grafanaToken=fake
              --set secrets.inline.piiSalt=fake
          - name: secrets-existing
            args: --set secrets.strategy=existing
          - name: gatewayapi-disabled
            args: --set gatewayApi.enabled=false
          - name: autoscaling-enabled
            args: --set collector.autoscaling.enabled=true
          - name: networkpolicy-cilium
            args: --set networkPolicy.cilium.enabled=true
          - name: prometheusrule-disabled
            args: --set prometheusRule.enabled=false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with: { version: v3.16.1 }

      - name: helm lint --strict
        run: helm lint "${CHART_DIR}" --strict

      - name: helm template
        run: |
          set -euo pipefail
          helm template ci "${CHART_DIR}" \
            --namespace jarvy-telemetry \
            ${{ matrix.scenario.args }} \
            > /tmp/${{ matrix.scenario.name }}.yaml
          test -s /tmp/${{ matrix.scenario.name }}.yaml

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION=v0.6.7
          curl -sSfL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          curl -sSfL -o /tmp/kubeconform-CHECKSUMS \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/CHECKSUMS"
          EXPECTED=$(grep 'kubeconform-linux-amd64.tar.gz' /tmp/kubeconform-CHECKSUMS | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/kubeconform.tar.gz | awk '{print $1}')
          [[ "${EXPECTED}" == "${ACTUAL}" ]]
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo install /tmp/kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          kubeconform -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json' \
            -ignore-missing-schemas \
            /tmp/${{ matrix.scenario.name }}.yaml

  negative-renders:
    name: Negative renders (fail() guards must fire)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with: { version: v3.16.1 }

      - name: gateway.create=false without parentRefs must fail
        run: |
          ! helm template ci "${CHART_DIR}" --namespace jarvy-telemetry \
            --set gatewayApi.gateway.create=false 2>&1 | tee /tmp/out
          grep -F "parentRefs must be set" /tmp/out

      - name: collector.config without acceptRawConfigUnsafe must fail
        run: |
          ! helm template ci "${CHART_DIR}" --namespace jarvy-telemetry \
            --set 'collector.config=receivers: {}' 2>&1 | tee /tmp/out
          grep -F "acceptRawConfigUnsafe" /tmp/out

      - name: secrets.strategy=inline without acceptRisk must fail
        run: |
          ! helm template ci "${CHART_DIR}" --namespace jarvy-telemetry \
            --set secrets.strategy=inline \
            --set secrets.inline.grafanaToken=fake \
            --set secrets.inline.piiSalt=fake 2>&1 | tee /tmp/out
          grep -F "acceptRisk: true" /tmp/out

      - name: secrets.strategy=bogus must fail
        run: |
          ! helm template ci "${CHART_DIR}" --namespace jarvy-telemetry \
            --set secrets.strategy=bogus 2>&1 | tee /tmp/out
          grep -F "must be one of" /tmp/out

      - name: traefikMiddlewares.enabled=true with non-Traefik class must fail
        run: |
          ! helm template ci "${CHART_DIR}" --namespace jarvy-telemetry \
            --set gatewayApi.gateway.gatewayClassName=envoy \
            --set gatewayApi.traefikMiddlewares.enabled=true 2>&1 | tee /tmp/out
          grep -F "requires gatewayApi.gateway.gatewayClassName=traefik" /tmp/out

  values-schema:
    name: values.schema.json invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with: { version: v3.16.1 }

      - name: Install yq + ajv
        run: |
          set -euo pipefail
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          npm install -g ajv-cli@5 ajv-formats@3

      - name: Schema validates against default values.yaml
        run: |
          set -euo pipefail
          # Helm validates this on every install/template, but assert it
          # at PR time so a schema regression doesn't ship to operators.
          yq -o=json '.' "${CHART_DIR}/values.yaml" > /tmp/values.json
          ajv validate \
            -s "${CHART_DIR}/values.schema.json" \
            -d /tmp/values.json \
            --spec=draft7 -c ajv-formats

      - name: passThroughAttributes and hashedAttributes are disjoint
        run: |
          set -euo pipefail
          PASS=$(yq -r '.pii.passThroughAttributes[]' "${CHART_DIR}/values.yaml" | sort)
          HASH=$(yq -r '.pii.hashedAttributes[]' "${CHART_DIR}/values.yaml" | sort)
          OVERLAP=$(comm -12 <(echo "${PASS}") <(echo "${HASH}"))
          if [[ -n "${OVERLAP}" ]]; then
            echo "::error::pii.passThroughAttributes and pii.hashedAttributes overlap (keys are both unhashed AND hashed — ambiguous): ${OVERLAP}"
            exit 1
          fi

      - name: Schema $id matches published URL
        run: |
          set -euo pipefail
          EXPECTED='https://jarvy.dev/schema/jarvy-telemetry-forwarder.values.schema.json'
          ACTUAL=$(yq -r '."$id"' "${CHART_DIR}/values.schema.json")
          if [[ "${EXPECTED}" != "${ACTUAL}" ]]; then
            echo "::error::values.schema.json $id is ${ACTUAL}; expected ${EXPECTED}. External systems pinning to the published URL will hit stale schema."
            exit 1
          fi

      - name: docs/schema copy is in sync with chart's values.schema.json
        run: |
          set -euo pipefail
          # The chart's values.schema.json is the source of truth.
          # `docs/schema/jarvy-telemetry-forwarder.values.schema.json`
          # is the published copy served at jarvy.dev. Both must match
          # byte-for-byte; external systems pinning to the URL would
          # get a different schema than Helm enforces otherwise.
          if ! diff -u "${CHART_DIR}/values.schema.json" docs/schema/jarvy-telemetry-forwarder.values.schema.json; then
            echo "::error::docs/schema copy is out of sync. Run: cp ${CHART_DIR}/values.schema.json docs/schema/jarvy-telemetry-forwarder.values.schema.json"
            exit 1
          fi

      - name: helm template renders cleanly with schema enforced
        run: |
          # helm template auto-validates against values.schema.json
          # for every render. If the schema is wrong (overly strict
          # or wrong type), every render fails — catch here at PR time.
          helm template ci "${CHART_DIR}" --namespace jarvy-telemetry >/dev/null

      - name: Negative test — schema rejects malformed input
        run: |
          set -euo pipefail
          # Schema must reject obvious mistakes. If it doesn't, the
          # schema is too lax and gives operators a false sense of
          # safety.
          set +e
          helm template ci "${CHART_DIR}" --namespace jarvy-telemetry \
            --set 'collector.image.digest=not-a-valid-digest' \
            2>/tmp/err.txt
          RC=$?
          set -e
          if [[ $RC -eq 0 ]]; then
            echo "::error::schema accepted an invalid digest pattern"
            cat /tmp/err.txt
            exit 1
          fi
          grep -i "digest" /tmp/err.txt || (echo "::error::schema failed but not for the expected reason"; cat /tmp/err.txt; exit 1)

  anonymize-invariants:
    name: Anonymize-pipeline invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with: { version: v3.16.1 }

      - name: Render default
        run: helm template ci "${CHART_DIR}" --namespace jarvy-telemetry > /tmp/render.yaml

      - name: transform/anonymize must be in every pipeline
        run: |
          grep -F "transform/anonymize" /tmp/render.yaml

      - name: filter/keep_allowlist must be in every pipeline
        run: |
          # Without keep_allowlist, attacker-controlled attribute keys
          # land in the backend plaintext. Regression guard for the
          # F3 enhancement plan finding.
          grep -F "filter/keep_allowlist" /tmp/render.yaml

      - name: Concat ordering must be value-then-salt (length-extension safety)
        run: |
          # SHA256(Concat([value, salt])) is safe; reversed is not.
          # This grep catches copy-paste reversals where someone puts
          # the salt env var first.
          if grep -E 'SHA256\(Concat\(\[\"\$\{env:PII_SALT\}\"' /tmp/render.yaml >/dev/null; then
            echo "::error::transform/anonymize has reversed Concat order (salt-first). Use value-first to preserve length-extension safety."
            exit 1
          fi

      - name: error_mode must be propagate (not ignore)
        run: |
          if grep -F "error_mode: ignore" /tmp/render.yaml; then
            echo "::error::transform processor has error_mode: ignore — silent failures bypass anonymization. Switch to propagate."
            exit 1
          fi

  workflow-meta-checks:
    name: Workflow meta checks (regression guards for 0.1.0 release-day bugs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: tag-verify path uses fetch-tags + annotated refetch
        run: |
          # The 0.1.0 release first failed because actions/checkout did
          # not fetch annotated tag objects. Composite action exists
          # to enforce; assert it's referenced from helm-release.yml.
          grep -F "uses: ./.github/actions/verify-signed-tag" .github/workflows/helm-release.yml
          grep -F "fetch-tags: true" .github/workflows/helm-release.yml
          grep -F "refs/tags/" .github/actions/verify-signed-tag/action.yml

      - name: helm + cosign both authenticate
        run: |
          # The 0.1.0 release also failed because cosign had no
          # credentials separate from helm. Assert both logins.
          grep -E "helm registry login.*--password-stdin" .github/workflows/helm-release.yml
          grep -E "cosign login.*--password-stdin" .github/workflows/helm-release.yml

      - name: cosign verify uses anchored identity, not unanchored regex
        run: |
          # Unanchored --certificate-identity-regexp lets a fork named
          # bearbinary/jarvy-anything spoof identity. Assert exact
          # --certificate-identity in published verify commands.
          if grep -E -- '--certificate-identity-regexp.*"\^?https://github\.com/\$\{\{ github.repository \}\}/"?$' .github/workflows/helm-release.yml; then
            echo "::error::cosign verify uses unanchored regex; switch to exact --certificate-identity."
            exit 1
          fi
          grep -F -- "--certificate-identity \"https://github.com/" .github/workflows/helm-release.yml

      - name: publish-packages tag-name gate is present
        run: |
          # Chart releases (helm-vX.Y.Z) must NOT trigger CLI
          # publishing. Assert publish-packages.yml gates on
          # tag_name starting with v.
          grep -F "startsWith(github.event.release.tag_name, 'v')" .github/workflows/publish-packages.yml

      - name: Install actionlint
        run: |
          set -euo pipefail
          # Direct binary install — raven-actions/actionlint has had
          # Node-module breakage that flapped CI; the upstream binary
          # release is stable. Pin to a known-good actionlint version.
          ACTIONLINT_VERSION=1.7.7
          curl -sSfL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp
          sudo install /tmp/actionlint /usr/local/bin/

      - name: actionlint
        run: actionlint -color .github/workflows/helm-release.yml .github/workflows/helm-chart-ci.yml .github/workflows/release.yml
