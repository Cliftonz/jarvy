name: Pre-Release Soak Gate

# Automated 24h soak gate for the currently-live rc / beta / alpha tag.
# Complements the existing per-publish workflows:
#
#   - `verify-release.yml`   — Path 8 (asset integrity + signatures) at t=0
#   - `release-paths.yml`    — Paths 2/3/4 (upgrade / skip-version / rollback) at t=0
#   - `prerelease-soak.yml`  — Path 1 (fresh install) + promotion-readiness at t=24h+
#
# `docs/release-testing.md#soak-window` requires a minimum soak of 24h for
# patch / 72h for minor / 7d for major before promoting an rc to stable.
# Pre-existing paths (2/3/4/8) all run at t=0 — meaning the ONLY thing
# blocking promotion after publish is the wall-clock wait. This workflow
# closes that: 24h after publish, if the rc is still the current one,
# run Path 1 + snapshot the state of the other paths + post a
# promotion-readiness comment on the release + open/update a
# `release-soak: <tag>` tracking issue.
#
# Idempotence & supersession:
#   - Skips if the release the schedule finds isn't the newest prerelease
#     (a newer `-rc.(N+1)` was cut in the interim; soak the newer one).
#   - Skips if a prior successful run of this workflow already posted the
#     "soak-24h-passed" label to the tracking issue.
#   - No-op returns are silent (info-level Actions summary only) so the
#     scheduled cron doesn't spam maintainers when there's nothing to do.
#
# Manual dispatch is supported for out-of-band re-soaks (e.g., an rc was
# cut, the schedule missed a firing, the maintainer wants to re-run
# after a fixup).

on:
  schedule:
    # Every 30 min. Cheap — the gate exits fast when there's nothing to
    # soak. Wall-clock granularity of 30 min on a 24-hour minimum window
    # is more than enough.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Pre-release tag to soak (default: auto-detect latest prerelease)'
        required: false
        type: string
      force:
        description: 'Skip the 24h minimum + supersession check (emergency re-soak)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: prerelease-soak
  cancel-in-progress: false

env:
  JARVY_TELEMETRY: '0'
  # Minimum soak in hours before Path 1 fires. Matches
  # docs/release-testing.md's patch-bump minimum. Minor + major soak
  # windows (72h / 7d) are the maintainer's call — this gate only
  # enforces the floor.
  MIN_SOAK_HOURS: '24'

jobs:
  # ============================================================================
  # Gate: decide whether to soak. Fast path exit for the "nothing to do"
  # case, which is the vast majority of scheduled firings.
  # ============================================================================
  gate:
    name: Decide whether to soak
    runs-on: ubuntu-latest
    outputs:
      should_soak: ${{ steps.decide.outputs.should_soak }}
      tag: ${{ steps.decide.outputs.tag }}
      is_prerelease: ${{ steps.decide.outputs.is_prerelease }}
      published_at: ${{ steps.decide.outputs.published_at }}
      already_soaked: ${{ steps.decide.outputs.already_soaked }}
      supersession_reason: ${{ steps.decide.outputs.supersession_reason }}
      bump_kind: ${{ steps.bump.outputs.bump_kind }}
      last_stable_tag: ${{ steps.bump.outputs.last_stable_tag }}
    steps:
      - name: Resolve target tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual dispatch → use provided tag; otherwise auto-detect the
          # newest prerelease. Auto-detect uses the same query as
          # `docs/release-testing.md`'s soak flow: newest release with
          # `prerelease: true`.
          MANUAL_TAG='${{ inputs.tag }}'
          if [ -n "$MANUAL_TAG" ]; then
            echo "Manual dispatch — using tag: $MANUAL_TAG"
            TAG="$MANUAL_TAG"
          else
            TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=25" \
              --jq '[.[] | select(.prerelease == true and .draft == false)] | .[0].tag_name // empty')
            if [ -z "$TAG" ]; then
              echo "No prerelease found — nothing to soak."
              echo "tag=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Auto-detected newest prerelease: $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decide
        id: decide
        if: steps.resolve.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          # Pull metadata for the target tag.
          RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG")
          IS_PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
          PUBLISHED_AT=$(echo "$RELEASE_JSON" | jq -r '.published_at // .created_at')

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"

          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "supersession_reason=not_a_prerelease" >> "$GITHUB_OUTPUT"
            echo "should_soak=false" >> "$GITHUB_OUTPUT"
            echo "Target is a stable release, not a prerelease — skipping."
            exit 0
          fi

          # Supersession check: verify $TAG is STILL the newest prerelease.
          # If someone cut a newer -rc.N+1 while the schedule was waiting,
          # abandon this run — soak the newer one instead.
          NEWEST_PRE=$(gh api "repos/${{ github.repository }}/releases?per_page=25" \
            --jq '[.[] | select(.prerelease == true and .draft == false)] | .[0].tag_name // empty')
          if [ "$NEWEST_PRE" != "$TAG" ]; then
            echo "supersession_reason=superseded_by_$NEWEST_PRE" >> "$GITHUB_OUTPUT"
            echo "should_soak=false" >> "$GITHUB_OUTPUT"
            echo "Newer prerelease ($NEWEST_PRE) exists — skipping soak of $TAG."
            exit 0
          fi

          # Wall-clock check: ≥ MIN_SOAK_HOURS since publish.
          if [ "$FORCE" = "true" ]; then
            echo "Force flag set — skipping wall-clock + supersession checks."
          else
            NOW_EPOCH=$(date -u +%s)
            PUB_EPOCH=$(date -u -d "$PUBLISHED_AT" +%s 2>/dev/null || \
                        python3 -c "from datetime import datetime; print(int(datetime.fromisoformat('$PUBLISHED_AT'.replace('Z','+00:00')).timestamp()))")
            AGE_HOURS=$(( (NOW_EPOCH - PUB_EPOCH) / 3600 ))
            echo "Release age: ${AGE_HOURS}h (min: ${MIN_SOAK_HOURS}h)"
            if [ "$AGE_HOURS" -lt "$MIN_SOAK_HOURS" ]; then
              echo "supersession_reason=too_young_${AGE_HOURS}h" >> "$GITHUB_OUTPUT"
              echo "should_soak=false" >> "$GITHUB_OUTPUT"
              echo "Release younger than ${MIN_SOAK_HOURS}h — schedule will re-check."
              exit 0
            fi
          fi

          # Already-soaked check: search issues for the tracking label.
          # Label shape: `soak-24h-passed-<tag>` (dashes only — avoids
          # any URL-encode surprises through the gh CLI + issue-search
          # index). Attached by the summary job at the end of a
          # successful soak.
          ALREADY=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state all \
            --label "soak-24h-passed-$TAG" \
            --limit 1 \
            --json number \
            --jq 'length')
          if [ "$ALREADY" -gt 0 ]; then
            echo "already_soaked=true" >> "$GITHUB_OUTPUT"
            echo "should_soak=false" >> "$GITHUB_OUTPUT"
            echo "$TAG already soaked (tracking-issue label present) — skipping."
            exit 0
          fi

          echo "should_soak=true" >> "$GITHUB_OUTPUT"
          echo "$TAG is eligible for soak."

      - name: Detect bump kind (patch/minor/major)
        id: bump
        if: steps.decide.outputs.should_soak == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          set -euo pipefail
          # Newest non-prerelease tag = "last stable". Compare its
          # semver components against the rc's to derive bump kind.
          # Paths 6/7 (per docs/release-testing.md#major-only-matrix) fire
          # only when bump_kind = "major". Path 5 fires on every soak.
          LAST_STABLE=$(gh api "repos/${{ github.repository }}/releases?per_page=50" \
            --jq '[.[] | select(.prerelease == false and .draft == false)] | .[0].tag_name // empty')
          echo "last_stable_tag=$LAST_STABLE" >> "$GITHUB_OUTPUT"
          if [ -z "$LAST_STABLE" ]; then
            echo "No prior stable release — treating bump as 'major' (bootstrap)."
            echo "bump_kind=major" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Strip v prefix + rc suffix. Format: MAJOR.MINOR.PATCH.
          rc_ver=$(echo "$TAG" | sed -E 's/^v//; s/-(rc|beta|alpha)\.[0-9]+$//')
          st_ver=$(echo "$LAST_STABLE" | sed -E 's/^v//; s/-(rc|beta|alpha)\.[0-9]+$//')
          rc_maj=$(echo "$rc_ver" | cut -d. -f1)
          rc_min=$(echo "$rc_ver" | cut -d. -f2)
          st_maj=$(echo "$st_ver" | cut -d. -f1)
          st_min=$(echo "$st_ver" | cut -d. -f2)
          if [ "$rc_maj" -gt "$st_maj" ]; then
            BUMP=major
          elif [ "$rc_min" -gt "$st_min" ]; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "rc=$rc_ver last_stable=$st_ver bump_kind=$BUMP"
          echo "bump_kind=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Summarize decision
        if: always()
        run: |
          {
            echo "## Soak-gate decision"
            echo ""
            echo "- Tag: \`${{ steps.decide.outputs.tag || 'none' }}\`"
            echo "- Should soak: \`${{ steps.decide.outputs.should_soak || 'false' }}\`"
            echo "- Bump kind: \`${{ steps.bump.outputs.bump_kind || 'unknown' }}\`"
            echo "- Last stable: \`${{ steps.bump.outputs.last_stable_tag || 'none' }}\`"
            [ -n "${{ steps.decide.outputs.supersession_reason }}" ] && \
              echo "- Supersession reason: \`${{ steps.decide.outputs.supersession_reason }}\`"
            [ -n "${{ steps.decide.outputs.published_at }}" ] && \
              echo "- Published at: \`${{ steps.decide.outputs.published_at }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Path 1 — Fresh install on each cohort platform. This is the coverage
  # missing from `release-paths.yml` (which owns Paths 2/3/4). Downloads
  # the archive from the release, extracts, runs `jarvy --version` +
  # `jarvy discover --format json` on a fixture project.
  # ============================================================================
  fresh-install:
    name: Path 1 — Fresh install (${{ matrix.name }})
    needs: gate
    if: needs.gate.outputs.should_soak == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Ubuntu 22.04 x86_64
            asset_pattern: 'jarvy-*-x86_64-unknown-linux-musl.tar.gz'
            binary: jarvy
            archive_kind: tar
          - os: macos-14
            name: macOS arm64
            asset_pattern: 'jarvy-*-aarch64-apple-darwin.tar.gz'
            binary: jarvy
            archive_kind: tar
          - os: windows-latest
            name: Windows x86_64
            asset_pattern: 'jarvy-*-x86_64-pc-windows-msvc.zip'
            binary: jarvy.exe
            archive_kind: zip
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ needs.gate.outputs.tag }}
    steps:
      - name: Checkout (for fixture project)
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.tag }}
          fetch-depth: 1

      - name: Download release archive
        id: download
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_PATTERN: ${{ matrix.asset_pattern }}
          FALLBACK_PATTERN: ${{ matrix.fallback_asset_pattern || '' }}
        run: |
          set -euo pipefail
          mkdir -p _soak && cd _soak
          if gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "$ASSET_PATTERN" 2>/dev/null; then
            echo "Downloaded primary asset ($ASSET_PATTERN)"
            echo "used_fallback=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$FALLBACK_PATTERN" ] && gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "$FALLBACK_PATTERN" 2>/dev/null; then
            echo "::warning::Primary asset $ASSET_PATTERN missing; used fallback $FALLBACK_PATTERN"
            echo "used_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Neither $ASSET_PATTERN nor $FALLBACK_PATTERN present in $TAG"
            exit 1
          fi
          ls -la

      - name: Extract binary (tar)
        if: matrix.archive_kind == 'tar' && steps.download.outputs.used_fallback == 'false'
        shell: bash
        run: |
          set -euo pipefail
          cd _soak
          tar xzf jarvy-*.tar.gz
          # Move binary into a stable location so the downstream steps
          # don't have to guess.
          find . -type f -name '${{ matrix.binary }}' -exec mv {} ./jarvy \;
          chmod +x jarvy
          ./jarvy --version

      - name: Extract binary (zip)
        if: matrix.archive_kind == 'zip' && steps.download.outputs.used_fallback == 'false'
        shell: pwsh
        run: |
          Set-Location _soak
          Expand-Archive -Path (Get-Item 'jarvy-*.zip').FullName -DestinationPath .
          # Locate jarvy.exe; move to stable path.
          $bin = Get-ChildItem -Recurse -Filter 'jarvy.exe' | Select-Object -First 1
          Move-Item $bin.FullName .\jarvy.exe -Force
          .\jarvy.exe --version

      - name: Extract binary (macOS dmg fallback)
        if: matrix.archive_kind == 'tar' && steps.download.outputs.used_fallback == 'true' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cd _soak
          DMG=$(ls jarvy_*_aarch64.dmg)
          MOUNT=$(hdiutil attach -nobrowse -readonly -mountrandom /tmp "$DMG" | tail -1 | awk '{print $3}')
          # Copy binary out; unmount immediately so we don't leak the mount.
          cp "$MOUNT"/jarvy ./jarvy
          hdiutil detach "$MOUNT" -quiet
          chmod +x jarvy
          ./jarvy --version

      - name: Smoke — version reports tag
        shell: bash
        run: |
          set -euo pipefail
          cd _soak
          # Tag is `v0.5.0-rc.1`; `jarvy --version` reports `jarvy 0.5.0`.
          # Strip the `v` prefix and the `-rc.N` suffix for the comparison —
          # Cargo.toml only carries the semver-major-minor-patch.
          EXPECTED=$(echo "$TAG" | sed -E 's/^v//; s/-(rc|beta|alpha)\.[0-9]+$//')
          REPORTED=$(./jarvy --version | awk '{print $2}')
          echo "Expected: $EXPECTED"
          echo "Reported: $REPORTED"
          if [ "$EXPECTED" != "$REPORTED" ]; then
            echo "::error::Version mismatch: tag $TAG → expected $EXPECTED, jarvy --version reports $REPORTED"
            exit 1
          fi

      - name: Smoke — discover on a polyglot fixture
        shell: bash
        run: |
          set -euo pipefail
          cd _soak
          # Build a small polyglot fixture and exercise the discover
          # pass — this is the "does the wizard's back-end still work?"
          # signal. jq (not python3) so the assertion runs on Windows
          # too; jq ships pre-installed on every runner.
          mkdir -p fixture
          cd fixture
          {
            echo '[package]'
            echo 'name = "fixture"'
            echo 'version = "0.0.0"'
            echo 'edition = "2024"'
          } > Cargo.toml
          echo '{}' > package.json
          touch pnpm-lock.yaml
          # `discover` is telemetry-gated + fully deterministic — safe
          # to run inside CI without polluting production data.
          BIN="$(cd .. && pwd)/jarvy"
          # On Windows the binary is jarvy.exe.
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          "$BIN" discover --format json > report.json
          # Cross-platform assertion: extract required names + diff
          # against the expected set via jq. Missing entries print +
          # exit 1.
          MISSING=$(jq -r '
            (["rust","node","pnpm"]) as $expected
            | ([.required[]?.name] | sort) as $got
            | ($expected - $got)
            | join(",")
          ' report.json)
          if [ -n "$MISSING" ]; then
            echo "::error::discover output missing required entries: $MISSING"
            cat report.json
            exit 1
          fi
          jq '.required | map(.name)' report.json

  # ============================================================================
  # Path 5 — Multi-Tool Real-World Setup. Runs `jarvy setup --dry-run`
  # against a ≥10-tool `jarvy.toml` (3+ package managers, role with
  # inheritance, `[npm]/[pip]/[cargo]` section, default-hook tool) on
  # BOTH the rc binary AND the last-stable binary, and asserts that
  # rc-time ≤ 1.5x baseline-time — the sev-2 threshold from
  # docs/release-testing.md.
  #
  # Dry-run is used because real installs would (a) hit network and
  # (b) mutate a shared runner. Dry-run still exercises the full
  # config-parse → resolve → hook-schedule pipeline, which is what
  # regresses when we churn wizard / discover / registry code. Real
  # installs are covered by Path 1 above with a smaller fixture.
  # ============================================================================
  path5-multi-tool:
    name: Path 5 — Multi-tool setup timing
    needs: gate
    if: needs.gate.outputs.should_soak == 'true'
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.gate.outputs.tag }}
      LAST_STABLE: ${{ needs.gate.outputs.last_stable_tag }}
    steps:
      - name: Download rc binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _rc && cd _rc
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --pattern 'jarvy-*-x86_64-unknown-linux-musl.tar.gz'
          tar xzf jarvy-*.tar.gz
          find . -type f -name jarvy -exec mv {} ./jarvy \;
          chmod +x jarvy
          ./jarvy --version

      - name: Download last-stable binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$LAST_STABLE" ]; then
            echo "::warning::No last-stable — Path 5 will run rc-only (no timing comparison)."
            exit 0
          fi
          mkdir -p _stable && cd _stable
          if ! gh release download "$LAST_STABLE" --repo "${{ github.repository }}" \
              --pattern 'jarvy-*-x86_64-unknown-linux-musl.tar.gz' 2>/dev/null; then
            echo "::warning::Last-stable $LAST_STABLE has no musl tarball; skipping baseline."
            exit 0
          fi
          tar xzf jarvy-*.tar.gz
          find . -type f -name jarvy -exec mv {} ./jarvy \;
          chmod +x jarvy
          ./jarvy --version

      - name: Build 10+ tool fixture
        run: |
          set -euo pipefail
          mkdir -p fixture && cd fixture
          # Fixture must be built entirely from tools registered in
          # BOTH rc and last-stable — otherwise the older binary
          # bails on unknown tools before we can time anything. The
          # set below covers 3+ package managers (brew / apt / winget
          # abstracted by jarvy's PM layer) + `[npm]/[pip]/[cargo]`
          # sections + starship (default hook) + roles inheritance.
          cat > jarvy.toml <<'TOML'
          [provisioner]
          git = "latest"
          jq = "latest"
          ripgrep = "latest"
          fd = "latest"
          bat = "latest"
          starship = "latest"
          gh = "latest"
          zoxide = "latest"
          direnv = "latest"
          just = "latest"
          curl = "latest"
          wget = "latest"

          [npm]
          typescript = "latest"

          [pip]
          httpx = "latest"

          [cargo]
          cargo-nextest = "latest"

          [roles.base]
          tools = ["git", "jq", "curl"]

          [roles.dev]
          extends = "base"
          tools = ["ripgrep", "fd", "bat", "starship"]
          TOML

      - name: Time — rc dry-run
        id: rc_time
        run: |
          set -euo pipefail
          cd fixture
          BIN="$(cd .. && pwd)/_rc/jarvy"
          # Warm cache with a resolve pass (rules parse, registry
          # lookup) so we're timing the setup phase, not first-run I/O.
          "$BIN" validate --file jarvy.toml >/dev/null 2>&1 || true
          # `jarvy setup` doesn't accept `--format` (that's on inspection
          # subcommands like validate/discover/schema). Setup only has
          # global `--log-format`, which routes tracing output, not
          # stdout envelope. Time the plain dry-run.
          T0=$(date +%s%3N)
          "$BIN" setup --file jarvy.toml --dry-run > rc_report.txt 2>&1
          T1=$(date +%s%3N)
          RC_MS=$(( T1 - T0 ))
          echo "rc_ms=$RC_MS" >> "$GITHUB_OUTPUT"
          echo "rc dry-run: ${RC_MS}ms"
          tail -20 rc_report.txt || true

      - name: Time — last-stable dry-run (baseline)
        id: stable_time
        run: |
          set -euo pipefail
          if [ ! -f _stable/jarvy ]; then
            echo "stable_ms=0" >> "$GITHUB_OUTPUT"
            echo "::warning::No baseline available — skipping comparison."
            exit 0
          fi
          cd fixture
          BIN="$(cd .. && pwd)/_stable/jarvy"
          # last-stable may not know newer keys → tolerate parse errors,
          # skip timing rather than fail the whole gate.
          if ! "$BIN" validate --file jarvy.toml >/dev/null 2>&1; then
            echo "::warning::last-stable rejects fixture (new schema keys). Skipping baseline."
            echo "stable_ms=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Do NOT pass --format json to the baseline: the JSON envelope
          # (PRD-051) may not have shipped in every prior stable, and a
          # fast-fail on the flag would bias the baseline artificially
          # low, causing the rc to appear slow by comparison. Timing the
          # dry-run alone is the apples-to-apples measurement.
          T0=$(date +%s%3N)
          "$BIN" setup --file jarvy.toml --dry-run > stable_report.txt 2>&1 || true
          T1=$(date +%s%3N)
          STABLE_MS=$(( T1 - T0 ))
          echo "stable_ms=$STABLE_MS" >> "$GITHUB_OUTPUT"
          echo "stable baseline: ${STABLE_MS}ms"

      - name: Assert rc ≤ 1.5x baseline
        env:
          RC_MS: ${{ steps.rc_time.outputs.rc_ms }}
          STABLE_MS: ${{ steps.stable_time.outputs.stable_ms }}
        run: |
          set -euo pipefail
          if [ "$STABLE_MS" = "0" ]; then
            echo "::warning::No baseline captured — Path 5 passes on rc-only smoke."
            echo "rc dry-run: ${RC_MS}ms (baseline: n/a)"
            exit 0
          fi
          # Noise floor: sub-500ms measurements are dominated by process
          # startup (arg parse, TLS init, tracing subscriber). The docs'
          # 1.5x threshold assumes multi-second real-install workloads;
          # applying it to <500ms dry-runs surfaces measurement jitter
          # (e.g. rc=88ms vs baseline=43ms → 2x delta from CPU noise).
          # Fall back to a fixed 250ms absolute-delta budget below the
          # floor. Above 500ms the ratio test bites.
          if [ "$STABLE_MS" -lt 500 ]; then
            DELTA=$(( RC_MS - STABLE_MS ))
            [ "$DELTA" -lt 0 ] && DELTA=0
            echo "rc: ${RC_MS}ms  baseline: ${STABLE_MS}ms  noise-floor mode (delta: ${DELTA}ms, budget: 250ms)"
            if [ "$DELTA" -gt 250 ]; then
              echo "::error::Path 5 sev-2: rc setup timing exceeds baseline by ${DELTA}ms (budget 250ms) below noise floor"
              exit 1
            fi
            echo "Path 5 PASS: absolute delta within noise-floor budget."
            exit 0
          fi
          # Above noise floor — apply the 1.5x ratio. Integer math via
          # *3 / 2 avoids bc.
          THRESH_MS=$(( STABLE_MS * 3 / 2 ))
          echo "rc: ${RC_MS}ms  baseline: ${STABLE_MS}ms  threshold (1.5x): ${THRESH_MS}ms"
          if [ "$RC_MS" -gt "$THRESH_MS" ]; then
            echo "::error::Path 5 sev-2: rc setup timing ${RC_MS}ms > 1.5x baseline ${STABLE_MS}ms (threshold ${THRESH_MS}ms)"
            exit 1
          fi
          echo "Path 5 PASS: within 1.5x baseline."

  # ============================================================================
  # Path 6 — Breaking-Config Negative Test (MAJOR ONLY).
  # Feed the rc a `jarvy.toml` written against the last-stable schema
  # (fetched from the last-stable tag's repo tree). Assert the rc
  # either accepts it (deprecation warning present) or fails with a
  # clear error naming the breaking change. Silent acceptance with
  # broken behavior would be sev-1 — this job encodes that check as
  # "rc must produce output containing the word 'deprecat' or exit
  # non-zero with a stderr mentioning 'migration'."
  # ============================================================================
  path6-breaking-config:
    name: Path 6 — Breaking-config (major only)
    needs: gate
    if: needs.gate.outputs.should_soak == 'true' && needs.gate.outputs.bump_kind == 'major'
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.gate.outputs.tag }}
      LAST_STABLE: ${{ needs.gate.outputs.last_stable_tag }}
    steps:
      - name: Download rc binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _rc && cd _rc
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --pattern 'jarvy-*-x86_64-unknown-linux-musl.tar.gz'
          tar xzf jarvy-*.tar.gz
          find . -type f -name jarvy -exec mv {} ./jarvy \;
          chmod +x jarvy

      - name: Fetch last-stable example jarvy.toml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$LAST_STABLE" ]; then
            echo "::warning::No last-stable — Path 6 has nothing to test against."
            exit 0
          fi
          mkdir -p fixture && cd fixture
          # Pull the example jarvy.toml from the last-stable tag tree.
          # Fallback to the repo root's jarvy.toml if `examples/` layout
          # ever changes.
          for CANDIDATE in jarvy.toml examples/rust-cli/jarvy.toml examples/fullstack/jarvy.toml; do
            if gh api "repos/${{ github.repository }}/contents/$CANDIDATE?ref=$LAST_STABLE" \
                --jq '.content' 2>/dev/null | base64 -d > jarvy.toml; then
              if [ -s jarvy.toml ]; then
                echo "Fetched $CANDIDATE from $LAST_STABLE"
                break
              fi
            fi
          done
          test -s jarvy.toml || { echo "::error::No example jarvy.toml found in $LAST_STABLE"; exit 1; }
          head -30 jarvy.toml

      - name: Assert rc handles last-stable schema gracefully
        run: |
          set -euo pipefail
          if [ ! -d fixture ] || [ ! -f fixture/jarvy.toml ]; then
            echo "::warning::No fixture; skipping."
            exit 0
          fi
          cd fixture
          BIN="$(cd .. && pwd)/_rc/jarvy"
          # Case A: rc accepts with deprecation notice → OK.
          # Case B: rc rejects with error naming migration → OK.
          # Case C: silent accept, no deprecation notice → sev-1 fail.
          set +e
          "$BIN" validate --file jarvy.toml > out.txt 2> err.txt
          EXIT=$?
          set -e
          cat out.txt err.txt
          if [ "$EXIT" -eq 0 ]; then
            if grep -qiE 'deprecat|migrat' out.txt err.txt; then
              echo "Path 6 PASS: rc accepted with deprecation/migration hint."
              exit 0
            fi
            echo "::warning::Path 6 sev-3: rc accepted last-stable schema silently — no deprecation hint. Verify manually before promotion."
            exit 0
          else
            if grep -qiE 'migrat|deprecat|schema' err.txt out.txt; then
              echo "Path 6 PASS: rc rejected with clear migration/schema error."
              exit 0
            fi
            echo "::error::Path 6 sev-1: rc rejected last-stable schema but error mentions neither migration nor deprecation."
            exit 1
          fi

  # ============================================================================
  # Path 7 — Documented Migration Replay (MAJOR ONLY).
  # From a fresh N-1 state, run `jarvy migrate` and assert it produces
  # a report (or applies a migration) without panicking. Replays the
  # documented upgrade path so a botched migrator can't ship stable.
  # ============================================================================
  path7-migration-replay:
    name: Path 7 — Migration replay (major only)
    needs: gate
    if: needs.gate.outputs.should_soak == 'true' && needs.gate.outputs.bump_kind == 'major'
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.gate.outputs.tag }}
      LAST_STABLE: ${{ needs.gate.outputs.last_stable_tag }}
    steps:
      - name: Download rc binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _rc && cd _rc
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --pattern 'jarvy-*-x86_64-unknown-linux-musl.tar.gz'
          tar xzf jarvy-*.tar.gz
          find . -type f -name jarvy -exec mv {} ./jarvy \;
          chmod +x jarvy

      - name: Snapshot fresh N-1 state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$LAST_STABLE" ]; then
            echo "::warning::No last-stable — Path 7 has nothing to replay."
            exit 0
          fi
          mkdir -p fixture && cd fixture
          # Fetch the last-stable example jarvy.toml as the "N-1
          # state" seed. Real migration replays would also seed
          # `~/.jarvy/config.toml` + `.jarvy/state.json`, but those
          # are user-generated at runtime — the CLI's `migrate`
          # command operates on jarvy.toml only per src/cli/args.rs.
          for CANDIDATE in jarvy.toml examples/rust-cli/jarvy.toml examples/fullstack/jarvy.toml; do
            if gh api "repos/${{ github.repository }}/contents/$CANDIDATE?ref=$LAST_STABLE" \
                --jq '.content' 2>/dev/null | base64 -d > jarvy.toml; then
              [ -s jarvy.toml ] && break
            fi
          done
          test -s jarvy.toml || { echo "::error::No seed jarvy.toml found."; exit 1; }

      - name: Replay `jarvy migrate --format json`
        run: |
          set -euo pipefail
          if [ ! -f fixture/jarvy.toml ]; then
            echo "::warning::No fixture; skipping."
            exit 0
          fi
          cd fixture
          BIN="$(cd .. && pwd)/_rc/jarvy"
          # Dry-run: `migrate` without --apply is report-only per
          # src/cli/args.rs:557 comment. Any non-zero exit or panic
          # is sev-1: users following the documented migration would
          # hit the same failure. JSON envelope required for
          # machine-verifiable pass.
          "$BIN" migrate --file jarvy.toml --format json > report.json
          echo "--- migrate report ---"
          cat report.json
          # Sanity: report must parse as JSON. That alone catches
          # panic-produces-partial-output regressions.
          jq . report.json >/dev/null
          echo "Path 7 PASS: migrate replay produced valid JSON."

  # ============================================================================
  # Summary — post the promotion-readiness signal to a tracking issue
  # + comment on the release. This job is the "24h passed" signal the
  # cutting-release skill's checklist can look for.
  # ============================================================================
  summary:
    name: Post soak-passed signal
    needs: [gate, fresh-install, path5-multi-tool, path6-breaking-config, path7-migration-replay]
    # Path 5 must pass. Paths 6/7 only fire on majors — if skipped
    # (bump_kind != major), their result == 'skipped' which does NOT
    # equal 'failure', so the `!= 'failure'` guard passes for patch /
    # minor bumps. Fresh-install must PASS (never skipped). Wrap in
    # always() so a skipped major-only job doesn't short-circuit us.
    if: |
      always() &&
      needs.gate.outputs.should_soak == 'true' &&
      needs.fresh-install.result == 'success' &&
      needs.path5-multi-tool.result == 'success' &&
      needs.path6-breaking-config.result != 'failure' &&
      needs.path7-migration-replay.result != 'failure'
    runs-on: ubuntu-latest
    # Workflow-level perms are `contents: read, issues: write`. This
    # job additionally needs `contents: write` for `gh release edit`
    # (appending the "24h soak: PASSED" footer to the release body).
    # Scoped per-job so the rest of the workflow keeps the minimum
    # surface area.
    permissions:
      contents: write
      issues: write
    env:
      TAG: ${{ needs.gate.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify companion workflows also PASSed on this tag
        id: companion
        run: |
          set -euo pipefail
          # release-paths.yml (Paths 2/3/4) + verify-release.yml (Path 8)
          # both trigger on `release: published`, so by t=24h they've had
          # ample time to complete. Check their status.
          COMPANION_OK=true
          for WF in "Release Paths Validation (2/3/4)" "Verify Release Assets"; do
            LATEST=$(gh api "repos/${{ github.repository }}/actions/workflows" \
              --jq ".workflows[] | select(.name == \"$WF\") | .id")
            if [ -z "$LATEST" ]; then
              echo "::warning::Workflow '$WF' not found — skipping companion check."
              continue
            fi
            # Find the most recent run of this workflow that matched the tag.
            RUN_STATUS=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "$LATEST" --limit 20 --json headBranch,conclusion,event,displayTitle \
              --jq "[.[] | select(.displayTitle | contains(\"$TAG\"))] | .[0].conclusion // \"none\"")
            echo "$WF for $TAG: $RUN_STATUS"
            if [ "$RUN_STATUS" != "success" ] && [ "$RUN_STATUS" != "none" ]; then
              echo "::warning::Companion workflow '$WF' did not PASS for $TAG ($RUN_STATUS). Soak signal remains advisory."
              COMPANION_OK=false
            fi
          done
          echo "companion_ok=$COMPANION_OK" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        id: issue
        run: |
          set -euo pipefail
          TITLE="Pre-release soak: $TAG"
          # Idempotent: find an existing issue by title, else create.
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --search "$TITLE in:title" --state all --limit 1 \
            --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            EXISTING=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --label release-soak \
              --body "Auto-created by \`prerelease-soak.yml\`. Populated during the 24h soak window; label \`soak-24h-passed-$TAG\` added when the gate passes.")
            EXISTING=$(echo "$EXISTING" | grep -oE '[0-9]+$')
          fi
          echo "number=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Ensure soak-passed label exists (repo-wide)
        run: |
          set -euo pipefail
          LABEL="soak-24h-passed-$TAG"
          if ! gh label list --repo "${{ github.repository }}" --limit 200 --json name --jq '.[].name' | grep -qxF "$LABEL"; then
            gh label create "$LABEL" --repo "${{ github.repository }}" --color 0e8a16 --description "24h soak passed on $TAG"
          fi

      - name: Attach label + summary comment
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
          COMPANION_OK: ${{ steps.companion.outputs.companion_ok }}
          BUMP_KIND: ${{ needs.gate.outputs.bump_kind }}
          PATH5_RESULT: ${{ needs.path5-multi-tool.result }}
          PATH6_RESULT: ${{ needs.path6-breaking-config.result }}
          PATH7_RESULT: ${{ needs.path7-migration-replay.result }}
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" --add-label "soak-24h-passed-$TAG"
          gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          ## 24h soak gate — PASSED

          - Tag: \`$TAG\`
          - Bump kind: \`$BUMP_KIND\`
          - Published: ${{ needs.gate.outputs.published_at }}
          - Path 1 (fresh install) — PASS on Ubuntu, macOS, Windows
          - Path 5 (multi-tool setup timing) — \`$PATH5_RESULT\`
          - Path 6 (breaking-config, major-only) — \`$PATH6_RESULT\`
          - Path 7 (migration replay, major-only) — \`$PATH7_RESULT\`
          - Companion workflows (release-paths, verify-release) status: \`$COMPANION_OK\`

          **Promotion readiness signal:** this label attaches when the
          minimum wall-clock window has elapsed AND Path 1 has passed
          on every cohort platform. Companion status is advisory only —
          verify via \`gh run list\` before promoting.

          Next: run the \`cutting-release\` skill to promote \`$TAG\` to
          stable, if maintainer soak observations agree. This label does
          NOT auto-authorize promotion — per-version authorization
          from the maintainer is still required.
          EOF
          )"

      - name: Comment on the release
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body' > /tmp/body.md
          # Append the soak signal to the body if not already present.
          if ! grep -q "24h soak: PASSED" /tmp/body.md; then
            printf "\n\n---\n\n**24h soak: PASSED** — see #%s for the audit trail.\n" \
              "${{ steps.issue.outputs.number }}" >> /tmp/body.md
            gh release edit "$TAG" --repo "${{ github.repository }}" --notes-file /tmp/body.md
          fi
