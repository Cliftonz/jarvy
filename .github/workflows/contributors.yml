name: Update Contributors

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for accurate contributor stats

      - name: Generate contributor data
        id: contributors
        run: |
          # Get contributor stats from git log
          echo "Generating contributor statistics..."

          # Create contributors JSON
          cat > data/contributors.json << 'JSONEOF'
          {
            "version": "1.0.0",
            "last_updated": "$(date -u +%Y-%m-%d)",
            "contributors": [
          JSONEOF

          # Get unique contributors with commit counts
          git log --format='%aN|%aE' | sort | uniq -c | sort -rn | head -50 | while IFS='|' read -r count name_email; do
            count=$(echo "$count" | tr -d ' ')
            name=$(echo "$name_email" | cut -d'|' -f1)
            email=$(echo "$name_email" | cut -d'|' -f2)

            # Try to get GitHub username from email
            username=$(echo "$email" | sed -n 's/.*+\([^@]*\)@users.noreply.github.com/\1/p')
            if [ -z "$username" ]; then
              username=$(echo "$email" | cut -d'@' -f1)
            fi

            echo "    {" >> data/contributors.json
            echo "      \"username\": \"$username\"," >> data/contributors.json
            echo "      \"name\": \"$name\"," >> data/contributors.json
            echo "      \"roles\": [\"contributor\"]," >> data/contributors.json
            echo "      \"tools\": []," >> data/contributors.json
            echo "      \"commits\": $count," >> data/contributors.json
            echo "      \"active\": true" >> data/contributors.json
            echo "    }," >> data/contributors.json
          done

          # Remove trailing comma and close JSON
          sed -i '$ s/,$//' data/contributors.json
          echo "  ]" >> data/contributors.json
          echo "}" >> data/contributors.json

      - name: Generate CONTRIBUTORS.md
        run: |
          cat > CONTRIBUTORS.md << 'EOF'
          # Contributors

          Thank you to everyone who has contributed to Jarvy! This file is automatically updated.

          ## All Contributors

          <!-- CONTRIBUTORS_START -->
          | Avatar | Name | Commits |
          |--------|------|---------|
          EOF

          # Parse contributors.json and generate table rows
          jq -r '.contributors[] | "| <img src=\"https://github.com/\(.username).png?size=50\" width=\"50\" /> | [\(.name // .username)](https://github.com/\(.username)) | \(.commits) |"' data/contributors.json >> CONTRIBUTORS.md

          cat >> CONTRIBUTORS.md << 'EOF'
          <!-- CONTRIBUTORS_END -->

          ## How to Contribute

          See [CONTRIBUTING.md](.github/CONTRIBUTING.md) for guidelines on how to contribute.

          ---

          *This file is automatically generated. Do not edit manually.*
          EOF

          echo "*Last updated: $(date -u +%Y-%m-%d)*" >> CONTRIBUTORS.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/contributors.json CONTRIBUTORS.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update contributors'
          title: 'chore: update contributors list'
          body: |
            This PR updates the contributors list based on git history.

            - Updated `data/contributors.json`
            - Updated `CONTRIBUTORS.md`

            This is an automated PR created by the Contributors workflow.
          branch: chore/update-contributors
          delete-branch: true
          labels: |
            documentation
            automated
