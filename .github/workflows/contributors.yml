name: Update Contributors

on:
  # The push-on-main trigger was removed because the PR creation step
  # (peter-evans/create-pull-request@v6) requires the repo setting
  # "Settings -> Actions -> General -> Workflow permissions -> Allow
  # GitHub Actions to create and approve pull requests". Without that,
  # every push fired the workflow and every workflow ended in
  # "GitHub Actions is not permitted to create or approve pull
  # requests". Restrict to the weekly schedule + manual dispatch so the
  # contributor list refreshes on a predictable cadence; flip the repo
  # setting to enable the PR step.
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Fetch all history for accurate contributor stats

      - name: Generate contributor data
        id: contributors
        run: |
          # Build data/contributors.json from git history.
          #
          # The previous shell-heredoc + per-contributor `echo` approach had
          # two bugs that made every run fail:
          #   1. The header heredoc used a single-quoted delimiter
          #      (<< 'JSONEOF'), which suppresses $() expansion. The
          #      "last_updated" field landed in the file as the literal
          #      string "$(date -u +%Y-%m-%d)" instead of a real date.
          #   2. The git-log/uniq parser was misaligned. `uniq -c` emits
          #      "   COUNT  Name|Email" but the loop split on '|' alone, so
          #      the variable named `count` actually held "   COUNT  Name".
          #      `tr -d ' '` then concatenated those, producing JSON like
          #      `"commits": 5ZacClifton,` and tripping jq's parser.
          #
          # Replace the lot with `git shortlog -sne` (canonical "count<TAB>
          # Name <email>" output) parsed line-by-line, piped into `jq -nR`
          # which builds the JSON atomically — no string interpolation, no
          # trailing-comma cleanup pass, no quoting traps.
          set -euo pipefail
          echo "Generating contributor statistics..."

          # Emit TSV: count<TAB>name<TAB>email<TAB>username (one row per dev).
          # `git shortlog -sne HEAD` is the standard way to get
          # commit-count-sorted contributor records and handles unicode,
          # quoted names, and email weirdness uniformly. The explicit
          # `HEAD` argument is required because shortlog reads stdin
          # when invoked non-interactively without a ref.
          git shortlog -sne HEAD | head -50 | while IFS= read -r line; do
            count=$(printf '%s' "$line" | awk '{print $1}')
            # Strip leading whitespace + count, leaving "Name <email>".
            rest=$(printf '%s' "$line" | sed -E 's/^[[:space:]]*[0-9]+[[:space:]]+//')
            name=${rest% <*}
            email=${rest##*<}
            email=${email%>}

            # GitHub-noreply emails carry the username we want for the
            # avatar URL: "12345+user@users.noreply.github.com" or the
            # legacy "user@users.noreply.github.com". Fall back to the
            # local-part for non-GitHub emails.
            if [[ "$email" =~ ^[0-9]+\+([^@]+)@users\.noreply\.github\.com$ ]]; then
              username="${BASH_REMATCH[1]}"
            elif [[ "$email" =~ ^([^@]+)@users\.noreply\.github\.com$ ]]; then
              username="${BASH_REMATCH[1]}"
            else
              username="${email%%@*}"
            fi

            printf '%s\t%s\t%s\t%s\n' "$count" "$name" "$email" "$username"
          done > /tmp/contributors.tsv

          # Build the JSON with jq from the TSV. Atomic: either the whole
          # document is valid or jq exits non-zero and the workflow fails
          # at this step rather than producing a half-written file the
          # next step has to parse.
          DATE=$(date -u +%Y-%m-%d)
          jq -nR --arg date "$DATE" '
            {
              version: "1.0.0",
              last_updated: $date,
              contributors: [
                inputs | split("\t") | {
                  username: .[3],
                  name: .[1],
                  roles: ["contributor"],
                  tools: [],
                  commits: (.[0] | tonumber),
                  active: true
                }
              ]
            }
          ' < /tmp/contributors.tsv > data/contributors.json

          # Quick validation: jq parse + show count.
          jq -e '.contributors | length' data/contributors.json
          echo "Wrote $(jq -r '.contributors | length' data/contributors.json) contributor(s)."

      - name: Generate CONTRIBUTORS.md
        run: |
          cat > CONTRIBUTORS.md << 'EOF'
          # Contributors

          Thank you to everyone who has contributed to Jarvy! This file is automatically updated.

          ## All Contributors

          <!-- CONTRIBUTORS_START -->
          | Avatar | Name | Commits |
          |--------|------|---------|
          EOF

          # Parse contributors.json and generate table rows
          jq -r '.contributors[] | "| <img src=\"https://github.com/\(.username).png?size=50\" width=\"50\" /> | [\(.name // .username)](https://github.com/\(.username)) | \(.commits) |"' data/contributors.json >> CONTRIBUTORS.md

          cat >> CONTRIBUTORS.md << 'EOF'
          <!-- CONTRIBUTORS_END -->

          ## How to Contribute

          See [CONTRIBUTING.md](.github/CONTRIBUTING.md) for guidelines on how to contribute.

          ---

          *This file is automatically generated. Do not edit manually.*
          EOF

          echo "*Last updated: $(date -u +%Y-%m-%d)*" >> CONTRIBUTORS.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/contributors.json CONTRIBUTORS.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update contributors'
          title: 'chore: update contributors list'
          body: |
            This PR updates the contributors list based on git history.

            - Updated `data/contributors.json`
            - Updated `CONTRIBUTORS.md`

            This is an automated PR created by the Contributors workflow.
          branch: chore/update-contributors
          delete-branch: true
          labels: |
            documentation
            automated
