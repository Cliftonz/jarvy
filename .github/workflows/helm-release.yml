name: Helm Chart Release

# Releases the jarvy-telemetry-forwarder Helm chart independently from
# the Jarvy CLI. Triggered by tags shaped `helm-vX.Y.Z` — the version
# after `helm-v` must match `version` in `dist/helm/<chart>/Chart.yaml`.
# Publishes the packaged chart as an OCI artifact to GHCR plus a
# cosign signature alongside it (keyless OIDC, matches the CLI's
# release-artifact signing model).
on:
  push:
    tags:
      - 'helm-v[0-9]+.[0-9]+.[0-9]+'
      - 'helm-v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to publish (e.g. 0.1.0). Must match Chart.yaml. Leave blank to derive from the current tag.'
        required: false

permissions:
  contents: write    # for creating the GitHub release
  packages: write    # for pushing to GHCR
  id-token: write    # for cosign keyless OIDC signing

env:
  CHART_DIR: dist/helm/jarvy-telemetry-forwarder
  OCI_REGISTRY: ghcr.io/${{ github.repository_owner }}/charts
  # Pinned action SHAs. Mutable tags (@v4, @v3) let a compromise of
  # the action's org or a maintainer's PAT inject code into every
  # release run with `id-token: write` + `packages: write`. Dependabot
  # keeps these SHAs current via .github/dependabot.yml.

jobs:
  release:
    name: Release Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # `fetch-tags: true` conflicts with `fetch-depth: 1` on
          # tag-trigger runs — actions/checkout tries to fetch both
          # the commit SHA and the tag ref into the SAME refs/tags/...
          # destination, failing with "Cannot fetch both ... and
          # refs/tags/... to refs/tags/...". The composite action
          # `verify-signed-tag` explicitly re-fetches the annotated
          # tag, so `fetch-tags` is redundant here anyway.

      - name: Verify signed tag and check no duplicate release
        if: startsWith(github.ref, 'refs/tags/helm-v')
        uses: ./.github/actions/verify-signed-tag
        with:
          tag-prefix: "helm-v"
          check-release-exists: "true"

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/helm-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/helm-v}"
          else
            echo "::error::This workflow must be triggered by a helm-vX.Y.Z tag or workflow_dispatch with an explicit version."
            exit 1
          fi
          CHART_VERSION=$(awk '/^version:/ { print $2; exit }' "${CHART_DIR}/Chart.yaml")
          if [[ "${VERSION}" != "${CHART_VERSION}" ]]; then
            echo "::error::Tag version ${VERSION} does not match Chart.yaml version ${CHART_VERSION}. Bump Chart.yaml and re-tag, or pick a matching tag."
            exit 1
          fi
          # Validate semver shape so workflow_dispatch with a junk input fails fast.
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version ${VERSION} is not valid semver (expected X.Y.Z or X.Y.Z-prerelease)."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved chart version: ${VERSION}"

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.18.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e # v3.8.2
        with:
          cosign-release: v2.4.0

      - uses: ./.github/actions/install-kubeconform

      - name: Lint chart
        run: helm lint "${CHART_DIR}" --strict

      - name: Template chart (matrix smoke render)
        run: |
          set -euo pipefail
          # Renders the chart under multiple value combinations to
          # catch template errors that lint can't see. Each case must
          # also pass kubeconform.
          mkdir -p /tmp/render

          helm template smoke "${CHART_DIR}" \
            --namespace jarvy-telemetry \
            --debug \
            > /tmp/render/default.yaml

          helm template smoke "${CHART_DIR}" \
            --namespace jarvy-telemetry \
            --set gatewayApi.gateway.create=false \
            --set gatewayApi.httpRoute.allowCrossNamespaceParent=true \
            --set 'gatewayApi.httpRoute.parentRefs[0].name=shared-gw' \
            --set 'gatewayApi.httpRoute.parentRefs[0].namespace=networking' \
            --set 'gatewayApi.httpRoute.parentRefs[0].sectionName=https' \
            --set secrets.strategy=inline \
            --set secrets.inline.acceptRisk=true \
            --set secrets.inline.grafanaToken=fake \
            --set secrets.inline.piiSalt=fake \
            --set collector.autoscaling.enabled=true \
            > /tmp/render/shared-gw.yaml

          helm template smoke "${CHART_DIR}" \
            --namespace jarvy-telemetry \
            --set gatewayApi.enabled=false \
            --set secrets.strategy=existing \
            > /tmp/render/gatewayapi-disabled.yaml

          test -s /tmp/render/default.yaml
          test -s /tmp/render/shared-gw.yaml
          test -s /tmp/render/gatewayapi-disabled.yaml

      - name: Validate manifests (kubeconform)
        run: |
          set -euo pipefail
          # Tolerates CRD-defined kinds (Gateway, HTTPRoute, Middleware,
          # ExternalSecret, Certificate, ServiceMonitor, PrometheusRule,
          # CiliumNetworkPolicy) via the datreeio CRDs catalog.
          for f in /tmp/render/*.yaml; do
            kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json' \
              -ignore-missing-schemas \
              "${f}"
          done

      # Anonymize-pipeline invariants live in helm-chart-ci.yml's
      # `anonymize-invariants` job, which runs on every PR. Re-running
      # them here would be belt-and-suspenders on a byte-deterministic
      # render. Skip — see chart-ci for the regression surface.

      - name: Upload rendered manifests as workflow artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: helm-rendered-${{ steps.version.outputs.version }}
          path: /tmp/render/
          retention-days: 30

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p /tmp/dist
          helm package "${CHART_DIR}" --destination /tmp/dist
          PKG="/tmp/dist/jarvy-telemetry-forwarder-${{ steps.version.outputs.version }}.tgz"
          test -f "${PKG}"
          SHA=$(sha256sum "${PKG}" | awk '{print $1}')
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Packaged chart: ${PKG}"
          echo "sha256: ${SHA}"

      - name: Log in to GHCR (helm + cosign)
        run: |
          set -euo pipefail
          # helm and cosign use independent credential stores.
          REGISTRY_HOST="${OCI_REGISTRY%%/*}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "${REGISTRY_HOST}" -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            cosign login "${REGISTRY_HOST}" -u "${{ github.actor }}" --password-stdin

      - name: Push chart to OCI registry
        id: push
        run: |
          set -euo pipefail
          PUSH_OUT=$(helm push "${{ steps.package.outputs.package }}" "oci://${OCI_REGISTRY}" 2>&1 | tee /dev/stderr)
          DIGEST=$(echo "${PUSH_OUT}" | awk -F'Digest: ' 'NF==2 { print $2 }' | tail -1)
          if [[ -z "${DIGEST}" ]]; then
            echo "::error::Failed to capture digest from helm push output."
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed at digest: ${DIGEST}"

      - name: Sign chart with cosign (keyless OIDC)
        id: sign
        run: |
          set -euo pipefail
          cosign sign --yes \
            --output-signature /tmp/cosign.sig \
            "${OCI_REGISTRY}/jarvy-telemetry-forwarder@${{ steps.push.outputs.digest }}" 2>&1 | tee /tmp/cosign.out
          # Capture the Rekor entry UUID for the Summary so on-call can
          # link to the transparency-log entry without re-deriving it.
          REKOR_UUID=$(grep -oE 'tlog entry created with index: [0-9]+' /tmp/cosign.out | awk '{print $NF}' | head -1)
          echo "rekor_uuid=${REKOR_UUID}" >> "$GITHUB_OUTPUT"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.8

      - name: Generate SBOM (single syft invocation, two output formats)
        run: |
          set -euo pipefail
          # anchore/sbom-action does not accept multiple output formats
          # in one invocation; call syft directly to do the catalog
          # scan ONCE and emit both formats. Cuts ~10s per release.
          syft scan "${{ steps.package.outputs.package }}" \
            -o "spdx-json=/tmp/sbom.spdx.json" \
            -o "cyclonedx-json=/tmp/sbom.cdx.json"

      - name: Attest SBOM via cosign
        id: attest
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate /tmp/sbom.spdx.json \
            --type spdxjson \
            "${OCI_REGISTRY}/jarvy-telemetry-forwarder@${{ steps.push.outputs.digest }}" 2>&1 | tee /tmp/cosign-attest.out
          REKOR_ATT_UUID=$(grep -oE 'tlog entry created with index: [0-9]+' /tmp/cosign-attest.out | awk '{print $NF}' | head -1)
          echo "rekor_uuid=${REKOR_ATT_UUID}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/helm-v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: "Helm chart ${{ steps.version.outputs.version }}"
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.package }}
            /tmp/sbom.spdx.json
            /tmp/sbom.cdx.json
          body: |
            Helm chart for the Jarvy telemetry forwarder.

            ## Install

            ```bash
            helm install jarvy-telemetry \
              oci://${{ env.OCI_REGISTRY }}/jarvy-telemetry-forwarder \
              --version ${{ steps.version.outputs.version }} \
              --namespace jarvy-telemetry --create-namespace
            ```

            ## Verify signature

            The `--certificate-identity` flag is **exact**, not a
            substring match. A fork named `bearbinary/jarvy-anything`
            cannot satisfy this identity even with a valid Sigstore
            certificate.

            ```bash
            cosign verify \
              --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/helm-release.yml@refs/tags/helm-v${{ steps.version.outputs.version }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.OCI_REGISTRY }}/jarvy-telemetry-forwarder:${{ steps.version.outputs.version }}
            ```

            ## Artifacts

            - OCI: `${{ env.OCI_REGISTRY }}/jarvy-telemetry-forwarder:${{ steps.version.outputs.version }}`
            - Digest: `${{ steps.push.outputs.digest }}`
            - Chart SHA256: `${{ steps.package.outputs.sha256 }}`
            - Signature Rekor UUID: `${{ steps.sign.outputs.rekor_uuid }}` — `https://search.sigstore.dev/?logIndex=${{ steps.sign.outputs.rekor_uuid }}`
            - SBOM attestation Rekor UUID: `${{ steps.attest.outputs.rekor_uuid }}` — `https://search.sigstore.dev/?logIndex=${{ steps.attest.outputs.rekor_uuid }}`
            - SBOMs: `sbom.spdx.json`, `sbom.cdx.json` attached

            Operational documentation:
            <https://jarvy.dev/operations/telemetry-forwarder/>

      - name: Summary
        if: always()
        run: |
          {
            echo "## Helm chart release"
            echo
            echo "- **Version:** \`${{ steps.version.outputs.version }}\`"
            echo "- **OCI ref:** \`${{ env.OCI_REGISTRY }}/jarvy-telemetry-forwarder:${{ steps.version.outputs.version }}\`"
            echo "- **Digest:** \`${{ steps.push.outputs.digest }}\`"
            echo "- **SHA256:** \`${{ steps.package.outputs.sha256 }}\`"
            echo "- **Signature Rekor:** [logIndex ${{ steps.sign.outputs.rekor_uuid }}](https://search.sigstore.dev/?logIndex=${{ steps.sign.outputs.rekor_uuid }})"
            echo "- **SBOM attest Rekor:** [logIndex ${{ steps.attest.outputs.rekor_uuid }}](https://search.sigstore.dev/?logIndex=${{ steps.attest.outputs.rekor_uuid }})"
            echo
            echo "Rendered manifests for this release are attached as a workflow artifact (\`helm-rendered-${{ steps.version.outputs.version }}\`)."
          } >> "$GITHUB_STEP_SUMMARY"
