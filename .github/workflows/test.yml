name: Test

on:
  # PR gate: Linux only. Public-repo Linux minutes are free; macOS + Windows
  # are not (macOS is 10x Linux per-minute). Cross-OS validation lives on
  # the release-tag matrix below + the nightly e2e-cross-platform run.
  # Doc-only / CI-only / examples-only PRs skipped via paths-ignore so a
  # README tweak doesn't fire the test suite.
  #
  # Tag push: full matrix (Linux + macOS + Windows). Release-cut is the
  # canonical integration check — full cross-OS validation here catches
  # regressions before the artifact build runs in release.yml.
  pull_request:
    branches: [ "main" ]
    # Positive filter: PR test runs only fire when source / tests / dep
    # manifests / build config change. Excludes doc-only, CI-only,
    # example-only, lint-config PRs that can't shift the test outcome.
    # Inverted from paths-ignore for predictability — easier to reason
    # about "what triggers a run" than "what does NOT trigger".
    paths:
      - 'src/**'
      - 'crates/**'
      - 'tests/**'
      - 'benches/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/test.yml'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

permissions:
  contents: read

# Cancel previous runs on the same ref. Force-pushes during PR iteration
# previously stacked 2-3 in-flight matrix runs per branch — each one
# burned its macOS + Windows slot before being cancelled by branch
# protection.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PR runs (free Linux minutes) get ubuntu-latest only.
        # Tag pushes add macos-latest + windows-latest for the
        # integration check. github.event_name is evaluated at
        # matrix-expansion time so this composes cleanly.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["macos-latest", "ubuntu-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@v7

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check the code
        # No --verbose — was producing megabytes of rustc invocation
        # spam per matrix entry on cache misses; cache hits don't need
        # them and failures already include the relevant diagnostic.
        run: cargo check --all-features

      - name: Run tests
        # `cargo nextest run` is 2-3x faster than `cargo test` on this
        # suite because nextest runs each test in its own process and
        # parallelizes across all cores; cargo test parallelizes within
        # a single binary but runs binaries sequentially. `--no-fail-fast`
        # surfaces the FULL failure set per run (cargo test stops at
        # first binary failure, which masked the Windows test-isolation
        # tech debt from v0.2.0-rc.1 through v0.2.1-rc.7).
        #
        # Dropped `--show-output` from the prior `cargo test` invocation
        # — Windows terminal I/O was eating 30s-1min per run dumping
        # stdout from every passing test. nextest captures per-test
        # output by default and only surfaces it for failures, which is
        # what we wanted anyway.
        run: cargo nextest run --all-features --no-fail-fast

      - name: Run doctests
        # nextest doesn't run doctests yet (rust-lang/rust#50297).
        # Doctests are tiny and only need to run on one OS; the Linux
        # job covers it. macOS / Windows skip with no functional cost.
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --doc --all-features
