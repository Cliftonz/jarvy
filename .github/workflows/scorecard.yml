# OpenSSF Scorecard workflow
# Implements PRD-020: Security Scanning Infrastructure
#
# Runs:
# - On branch protection rule changes
# - Weekly on Monday at midnight UTC
# - On push to main
#
# See: https://securityscorecards.dev/

name: OpenSSF Scorecard

on:
  # ossf/scorecard-action explicitly refuses to run on tag pushes:
  # "Only the default branch main is supported." The previous
  # trigger trim moved scorecard from `push: branches: [main]` to
  # `push: tags: ['v*']` to match other validating workflows; that
  # broke scorecard but didn't break the others. Restore main-push
  # so scorecard fires on every merge to main, plus the existing
  # weekly cron + branch_protection_rule. Release-tag scorecard
  # runs are not supported by the action and produce no useful
  # signal anyway.
  branch_protection_rule:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write  # For Sigstore-based OIDC authentication
      contents: read
      actions: read

    # IMPORTANT: scorecard's webapp publishing rejects this job if any
    # step uses a branch ref (e.g. `actions/checkout@v4`). The verifier
    # error reads "scorecard job must only have steps with `uses`" but
    # what it actually requires is SHA-pinned action references, since
    # branch refs are mutable and break supply-chain attestation. SHAs
    # below match ossf/scorecard's own scorecard-analysis.yml v2.4.3
    # baseline. Bump these in sync when upgrading the scorecard-action.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF for badge generation
          publish_results: true
          # Optional: Personal Access Token for private repos (not needed for public)
          # repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload Scorecard SARIF results
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30

      # NOTE: do NOT add `run:` steps to this job. ossf/scorecard-action's
      # webapp publishing rejects any job containing a non-`uses:` step
      # with the misleading error "scorecard job must only have steps with
      # `uses`, see [...]workflow-restrictions". A previous "Generate
      # Scorecard summary" step that wrote markdown via echo to
      # $GITHUB_STEP_SUMMARY caused every push to fail with that error.
      # If a summary is needed, put it in a SEPARATE job that depends on
      # this one (`needs: analysis`); the restriction is per-job.
