name: Jarvy Action Example

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Jarvy (from local source)
        uses: ./.github/actions/setup-jarvy
        with:
          method: path
          path: .

      - name: Show Jarvy version
        run: jarvy --version

      - name: Run Jarvy help
        run: jarvy --help
