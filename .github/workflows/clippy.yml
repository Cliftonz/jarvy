name: Rust-Clippy-Analyzer

on:
  # PRs gate clippy pre-merge; release tags re-validate at integration
  # time. push-to-main was removed because the merge commit already
  # matches a validated PR head. Weekly schedule catches new clippy
  # lints introduced by Rust toolchain updates.
  pull_request:
    branches: [ "main" ]
    # Positive filter: clippy only matters when Rust source or build
    # configuration changes. The .yml itself is included so workflow
    # tweaks still validate. test.yml's lint job also runs clippy as
    # part of the broader PR gate; this workflow's SARIF upload is the
    # value-add over that — keep it firing whenever .rs / Cargo.toml /
    # build.rs / rust-toolchain changes.
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'build.rs'
      - 'rust-toolchain.toml'
      - '.github/workflows/clippy.yml'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  schedule:
    - cron: '17 20 * * 0'
  workflow_dispatch:

# Cancel previous runs on the same ref (force-push during PR iteration).
concurrency:
  group: clippy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-clippy-analyze:
    name: Run rust-clippy analyzing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Install required cargo
        run: cargo install clippy-sarif sarif-fmt

      - name: Run rust-clippy
        run:
          cargo clippy
          --all-features
          --message-format=json | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
        continue-on-error: true

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true