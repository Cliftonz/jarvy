name: Publish to Package Managers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true

permissions:
  contents: read

env:
  VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}

jobs:
  publish-crates-io:
    name: Publish to crates.io
    # Skip on prereleases — rc / beta / alpha tags should not bump
    # crates.io (Cargo.toml carries the stable version, so publishing
    # on prerelease tag would push the next stable to crates.io as
    # `latest` prematurely). Empty `github.event.release` on
    # workflow_dispatch makes the property null, and `!null` is true
    # under GHA expression rules, so manual dispatches still run.
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    needs: [publish-crates-io]
    steps:
      - uses: actions/checkout@v4

      - name: Get release assets
        id: get_assets
        run: |
          VERSION="${{ env.VERSION }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Download checksums
          curl -sL "https://github.com/bearbinary/jarvy/releases/download/v${VERSION}/SHA256SUMS.txt" -o checksums.txt

          # Extract SHA256 for each platform
          MACOS_X86_SHA=$(grep "x86_64-apple-darwin" checksums.txt | awk '{print $1}' || echo "")
          MACOS_ARM_SHA=$(grep "aarch64-apple-darwin" checksums.txt | awk '{print $1}' || echo "")
          LINUX_X86_SHA=$(grep "x86_64-unknown-linux-gnu" checksums.txt | awk '{print $1}' || echo "")
          LINUX_ARM_SHA=$(grep "aarch64-unknown-linux-gnu" checksums.txt | awk '{print $1}' || echo "")

          echo "macos_x86_sha=$MACOS_X86_SHA" >> $GITHUB_OUTPUT
          echo "macos_arm_sha=$MACOS_ARM_SHA" >> $GITHUB_OUTPUT
          echo "linux_x86_sha=$LINUX_X86_SHA" >> $GITHUB_OUTPUT
          echo "linux_arm_sha=$LINUX_ARM_SHA" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.get_assets.outputs.version }}"
          FORMULA="dist/homebrew/jarvy.rb"

          # Update version and SHA256 placeholders
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" "$FORMULA"
          sed -i "s/SHA256_PLACEHOLDER_MACOS_X86/${{ steps.get_assets.outputs.macos_x86_sha }}/g" "$FORMULA"
          sed -i "s/SHA256_PLACEHOLDER_MACOS_ARM/${{ steps.get_assets.outputs.macos_arm_sha }}/g" "$FORMULA"
          sed -i "s/SHA256_PLACEHOLDER_LINUX_X86/${{ steps.get_assets.outputs.linux_x86_sha }}/g" "$FORMULA"
          sed -i "s/SHA256_PLACEHOLDER_LINUX_ARM/${{ steps.get_assets.outputs.linux_arm_sha }}/g" "$FORMULA"

      # Skip when the secret isn't configured. Homebrew tap propagation
      # requires HOMEBREW_TAP_DEPLOY_KEY (an SSH private key with write
      # access to the bearbinary/homebrew-tap repo) — see
      # docs/MAINTAINER_RELEASE_GUIDE.md for setup. Without it, the
      # cpina/github-action-push-to-another-repository action errors with
      # "API_TOKEN_GITHUB and SSH_DEPLOY_KEY are empty" and fails the
      # whole workflow. Mirror the AUR job's pattern (`continue-on-error`)
      # by gating the push step on secret presence so missing setup
      # surfaces as a warning instead of a release-breaking failure.
      - name: Check Homebrew tap secret
        id: tap_secret
        run: |
          if [ -z "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" ]; then
            echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not configured; skipping homebrew-tap push. Set the secret per docs/MAINTAINER_RELEASE_GUIDE.md to enable Homebrew distribution."
            echo "have_secret=false" >> $GITHUB_OUTPUT
          else
            echo "have_secret=true" >> $GITHUB_OUTPUT
          fi

      - name: Push to Homebrew tap
        if: steps.tap_secret.outputs.have_secret == 'true'
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        with:
          source-directory: dist/homebrew
          destination-github-username: bearbinary
          destination-repository-name: homebrew-tap
          user-email: github-actions[bot]@users.noreply.github.com
          target-branch: main
          commit-message: "Update jarvy to ${{ steps.get_assets.outputs.version }}"

  update-aur:
    name: Update AUR Package
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    needs: [publish-crates-io]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION="${{ env.VERSION }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" dist/aur/PKGBUILD-bin

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: jarvy-bin
          pkgbuild: dist/aur/PKGBUILD-bin
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.version }}"
        continue-on-error: true  # AUR publish may require manual setup

  update-winget:
    name: Submit to winget
    if: ${{ !github.event.release.prerelease }}
    runs-on: windows-latest
    needs: [publish-crates-io]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update winget manifest
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" dist/windows/winget.yaml

      - name: Submit to winget-pkgs
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Jarvy.Jarvy
          installers-regex: 'jarvy-.*-x86_64-pc-windows-.*\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
        continue-on-error: true  # May require manual approval

  update-chocolatey:
    name: Publish to Chocolatey
    if: ${{ !github.event.release.prerelease }}
    runs-on: windows-latest
    needs: [publish-crates-io]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update nuspec + install script (substitute placeholders)
        # The Chocolatey package ships TWO templated files:
        #   - jarvy.nuspec: VERSION_PLACEHOLDER (the package version)
        #   - tools/chocolateyinstall.ps1: VERSION_PLACEHOLDER (URL path)
        #     plus SHA256_PLACEHOLDER (msi integrity check)
        # The previous version of this step substituted only the
        # nuspec, leaving chocolateyinstall.ps1 with literal
        # VERSION_PLACEHOLDER tokens. Chocolatey's auto-verifier then
        # fetched a 404 URL and failed moderation. Substitute both
        # files, and fetch the real .msi SHA256 from SHA256SUMS.txt
        # so the install integrity check passes.
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          NUSPEC=dist/windows/chocolatey/jarvy.nuspec
          INSTALL=dist/windows/chocolatey/tools/chocolateyinstall.ps1

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" "$NUSPEC"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" "$INSTALL"

          # Pull the .msi SHA256 from the published checksums file.
          # Asset name pattern set by cargo-packager: jarvy_<v>_x64_en-US.msi
          curl -fsSL \
            "https://github.com/bearbinary/Jarvy/releases/download/v${VERSION}/SHA256SUMS.txt" \
            -o /tmp/sha256sums.txt
          MSI_SHA=$(awk -v p="jarvy_${VERSION}_x64_en-US.msi" \
            '$2 ~ p { print $1; exit }' /tmp/sha256sums.txt)
          if [ -z "$MSI_SHA" ]; then
            echo "::error::Could not find SHA256 for jarvy_${VERSION}_x64_en-US.msi in SHA256SUMS.txt"
            cat /tmp/sha256sums.txt
            exit 1
          fi
          # Convert to uppercase to match Chocolatey convention.
          MSI_SHA_UPPER=$(echo "$MSI_SHA" | tr 'a-z' 'A-Z')
          sed -i "s/SHA256_PLACEHOLDER/$MSI_SHA_UPPER/g" "$INSTALL"

          echo "Substituted version=$VERSION sha256=$MSI_SHA_UPPER into both files."

      - name: Pack and push to Chocolatey
        shell: powershell
        run: |
          cd dist/windows/chocolatey
          choco pack
          choco push jarvy.${{ steps.version.outputs.version }}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
        continue-on-error: true  # May require manual setup
