name: Build and Release

# PRD-020: Security Scanning Infrastructure
# - Sigstore signing for all release artifacts
# - SBOM generation (SPDX and CycloneDX)
# - Build provenance attestation

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        default: ''

permissions:
  contents: read

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}
  CARGO_TERM_COLOR: always

jobs:
  # PRD-051: Tag-signing enforcement + fail-fast guards.
  # Mirrors the omni-infra-provider-truenas release workflow: refuses any
  # tag-triggered release whose tag is not signed (GPG or SSH), and bails
  # out before any build work if the release already exists (assets are
  # immutable; you must delete the release before re-running).
  # Skipped on workflow_dispatch — manual runs use the operator's audit trail.
  verify_tag:
    name: Verify Tag Signature
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # `fetch-tags: true` would conflict with the tag-trigger
          # ref-spec on `fetch-depth: 1` runs. Composite action
          # below does the annotated-tag refetch explicitly.

      # Shared composite action handles annotated-tag refetch, signed-tag
      # verification, allowed-signers config, and the "release already
      # exists" guard. Same logic as the chart release; bug fixes in
      # one workflow propagate to the other.
      - uses: ./.github/actions/verify-signed-tag
        with:
          tag-prefix: "v"
          check-release-exists: "true"

  # Hard gate: refuse to ship if the Test workflow (test.yml) hasn't
  # gone green for this tag's commit SHA. test.yml + release.yml both
  # trigger on the same `v*` tag push but run in parallel — without
  # this gate, a tag push could publish artifacts even if integration
  # / E2E tests reported failures.
  #
  # Skipped on workflow_dispatch: manual releases are an explicit
  # operator override (matches `verify_tag`'s shape). The audit trail
  # is the operator's invocation, not a CI green check.
  #
  # Polls via `gh` CLI (preinstalled on GH-hosted runners) — avoids a
  # third-party action dependency. 15 min total budget at 30s
  # intervals: enough for the Linux + macOS + Windows test matrix to
  # complete; less than the typical artifact-build wall time so this
  # rarely extends the critical path.
  wait_for_tests:
    name: Wait for Test workflow (green required)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [verify_tag]
    permissions:
      actions: read
      contents: read
    steps:
      - name: Poll test.yml status for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          DEADLINE=$(( SECONDS + 15 * 60 ))
          ATTEMPT=0

          echo "Waiting for Test workflow on commit ${COMMIT_SHA}..."
          while [ $SECONDS -lt $DEADLINE ]; do
            ATTEMPT=$((ATTEMPT + 1))
            # `gh run list` with JSON fields the API guarantees. Filter
            # by workflow file name + the exact commit SHA so we don't
            # accidentally match the test run for a different ref that
            # happened to share the SHA (rare but possible on
            # cherry-picks).
            RESULT=$(gh run list \
              --repo "$REPO" \
              --workflow=test.yml \
              --commit="$COMMIT_SHA" \
              --limit 5 \
              --json status,conclusion,name,databaseId \
              || echo '[]')

            # Parse without jq's `--exit-status` to keep set -e safe.
            CONCLUSIONS=$(echo "$RESULT" | jq -r '.[].conclusion // "pending"')
            STATUSES=$(echo "$RESULT" | jq -r '.[].status // "pending"')

            if [ -z "$STATUSES" ]; then
              echo "[$ATTEMPT] No test.yml runs found yet for $COMMIT_SHA; sleeping 30s..."
              sleep 30
              continue
            fi

            # If ANY run for this commit failed/cancelled/timed_out,
            # fail the release immediately. Don't wait for the rest —
            # one red is enough.
            if echo "$CONCLUSIONS" | grep -E -q '^(failure|cancelled|timed_out|action_required|stale)$'; then
              echo "::error::Test workflow reported failure for $COMMIT_SHA. Refusing to release."
              echo "$RESULT" | jq -r '.[] | "  \(.name) → status=\(.status) conclusion=\(.conclusion) (run \(.databaseId))"'
              exit 1
            fi

            # All runs accounted for AND all green?
            if echo "$STATUSES" | grep -qv "completed"; then
              # Some still in_progress / queued — keep waiting.
              echo "[$ATTEMPT] Test runs still in flight; sleeping 30s..."
              echo "$RESULT" | jq -r '.[] | "  \(.name) → status=\(.status)"'
              sleep 30
              continue
            fi

            if echo "$CONCLUSIONS" | grep -qv "success"; then
              # Completed but not all success — should have been caught
              # by the failure grep above, but defense in depth.
              echo "::error::Test workflow completed with non-success conclusion for $COMMIT_SHA."
              echo "$RESULT" | jq -r '.[] | "  \(.name) → conclusion=\(.conclusion)"'
              exit 1
            fi

            echo "Test workflow green for $COMMIT_SHA. Proceeding with release."
            exit 0
          done

          echo "::error::Timed out waiting for Test workflow (15 min budget). Re-run after tests complete."
          exit 1

  build_and_package:
    name: Build & Package
    runs-on: ${{ matrix.platform }}
    needs: [verify_tag, wait_for_tests]
    # Both gates are skipped on workflow_dispatch; allow either skip
    # OR success to count as green. A failure on either explicitly
    # blocks release.
    if: |
      always()
      && (needs.verify_tag.result == 'success' || needs.verify_tag.result == 'skipped')
      && (needs.wait_for_tests.result == 'success' || needs.wait_for_tests.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_paths: |
              target/release/jarvy*_aarch64.dmg
              target/release/jarvy-v*-aarch64-apple-darwin.tar.gz
            build_args: ""
            cross: false
          # macos-13 (Intel) intentionally dropped from v0.1.0. Apple
          # stopped selling Intel Macs in 2022; macOS 15+ retired most
          # Intel hardware; GitHub-hosted macos-13 runner queues are
          # routinely 15-30 min and tax every release. Intel macOS users
          # install via `cargo install jarvy` (compiles from source) or
          # Homebrew (also compiles from source on Intel hosts). Re-add
          # this matrix slot if there is demand for prebuilt Intel .dmg.
          - platform: ubuntu-latest
            artifact_paths: |
              target/x86_64-unknown-linux-musl/release/jarvy*_amd64.deb
              target/x86_64-unknown-linux-musl/release/jarvy*_x86_64.AppImage
              target/x86_64-unknown-linux-musl/generate-rpm/jarvy*.rpm
              target/x86_64-unknown-linux-musl/release/jarvy-v*.tar.gz
            build_args: "--target=x86_64-unknown-linux-musl"
            cross: true
            apt: musl-tools
            sysroot: ""
            pkg_arch: musl
            rust_target: x86_64-unknown-linux-musl
          - platform: windows-latest
            artifact_paths: |
              target/release/jarvy*_x64_en-US.msi
              target/release/jarvy*_x64-setup.exe
              target/release/jarvy-v*-x86_64-pc-windows-msvc.zip
            build_args: ""
            cross: false
          - platform: ubuntu-latest
            artifact_paths: |
              target/aarch64-unknown-linux-gnu/release/jarvy*.deb
              target/aarch64-unknown-linux-gnu/generate-rpm/jarvy*.rpm
              target/aarch64-unknown-linux-gnu/release/jarvy-v*.tar.gz
            build_args: "--target=aarch64-unknown-linux-gnu"
            cross: true
            apt: gcc-aarch64-linux-gnu
            sysroot: /usr/aarch64-linux-gnu/
            pkg_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - platform: ubuntu-latest
            artifact_paths: |
              target/armv7-unknown-linux-gnueabihf/release/jarvy*.deb
              target/armv7-unknown-linux-gnueabihf/generate-rpm/jarvy*.rpm
              target/armv7-unknown-linux-gnueabihf/release/jarvy-v*.tar.gz
            build_args: "--target=armv7-unknown-linux-gnueabihf"
            cross: true
            apt: gcc-arm-linux-gnueabihf
            sysroot: /usr/arm-linux-gnueabihf/
            pkg_arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v7

      - name: Install cross dependencies (cross only)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential curl ${{ matrix.apt }}
      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Rust target (cross only)
        if: matrix.cross
        run: rustup target add ${{ matrix.rust_target }}

      - name: Set PKG_CONFIG_SYSROOT_DIR (cross only)
        if: matrix.cross && matrix.sysroot != ''
        run: echo "PKG_CONFIG_SYSROOT_DIR=${{ matrix.sysroot }}" >> "$GITHUB_ENV"

      - name: Install app dependencies
        # Prebuilt binaries via taiki-e/install-action drop the install step
        # from ~3 min of source compile per matrix slot to ~5 s of download.
        # Side benefits: silences the core2-yanked warning that came from
        # `cargo install --locked`, and removes ~/.cargo/bin cache pressure.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager,cargo-generate-rpm

      - name: Build the application
        run: cargo build --release ${{ matrix.build_args }}

      # Produce a raw binary tarball for each Linux target. AUR's
      # `jarvy-bin` PKGBUILD downloads this directly — no .deb / .rpm
      # extraction, no AppImage unpack, just `tar xzf` then
      # `install -Dm755 jarvy`. Matching the AUR convention also lets
      # other minimalist consumers (musl docker layers, embedded
      # bootstraps) skip every distro-specific wrapper. Asset name
      # `jarvy-v${VERSION}-${TRIPLE}.tar.gz` is the contract the AUR
      # PKGBUILD and the publish-packages.yml AUR awk pattern both pin
      # against. Only runs for Linux slots where `rust_target` is set.
      - name: Package raw Linux tarball
        if: matrix.platform == 'ubuntu-latest' && matrix.rust_target != ''
        shell: bash
        run: |
          set -euo pipefail
          TRIPLE="${{ matrix.rust_target }}"
          VER="${{ env.VERSION }}"
          VER_CLEAN="${VER#v}"
          OUT="target/${TRIPLE}/release/jarvy-v${VER_CLEAN}-${TRIPLE}.tar.gz"
          tar -C "target/${TRIPLE}/release" -czf "${OUT}" jarvy
          echo "Produced: ${OUT}"
          ls -la "${OUT}"

      # Issue #30: mac + Windows also need a plain binary archive so
      # the `jarvy update --method binary` path + `dist/scripts/install.sh`
      # + Homebrew formula all work. Previously only .dmg / .msi / .exe
      # shipped, which forced installer-mediated flows only.
      #
      # Naming mirrors the Linux tarball contract:
      #   jarvy-v${VER}-${TRIPLE}.{tar.gz,zip}
      # macos-latest is aarch64 as of 2024+ (macos-latest points at
      # macos-14 on the arm64 fleet); windows-latest is x86_64 msvc.
      - name: Package raw macOS tarball
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          TRIPLE="aarch64-apple-darwin"
          VER="${{ env.VERSION }}"
          VER_CLEAN="${VER#v}"
          OUT="target/release/jarvy-v${VER_CLEAN}-${TRIPLE}.tar.gz"
          tar -C target/release -czf "${OUT}" jarvy
          echo "Produced: ${OUT}"
          ls -la "${OUT}"

      - name: Package raw Windows zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Triple = 'x86_64-pc-windows-msvc'
          $Ver = '${{ env.VERSION }}'
          $VerClean = $Ver -replace '^v',''
          $Out = "target\release\jarvy-v$VerClean-$Triple.zip"
          # Use built-in Compress-Archive to sidestep third-party zip
          # deps. Archive contains a single `jarvy.exe` at the root
          # — matches the install.sh unzip contract at line 299 of
          # dist/scripts/install.sh.
          Compress-Archive -Path 'target\release\jarvy.exe' -DestinationPath $Out -Force
          Write-Host "Produced: $Out"
          Get-Item $Out

      - name: Package Binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ] && [ "${{ matrix.sysroot }}" != "" ]; then
            cargo packager --target=${{ matrix.rust_target }} --formats=deb --release --verbose
          elif [ "${{ matrix.cross }}" = "true" ] && [ -z "${{ matrix.sysroot }}" ]; then
            cargo packager --target=${{ matrix.rust_target }} --release --verbose
          else
            cargo packager --release --verbose
          fi
      - name: Package RPM
        if: matrix.platform == 'ubuntu-latest'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo generate-rpm --target=${{ matrix.rust_target }}
          else
            cargo generate-rpm
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.platform }}${{ matrix.cross && format('-{0}', matrix.pkg_arch) || '' }}-release-artifacts
          path: ${{ matrix.artifact_paths }}

  # Generate Software Bill of Materials (SBOM)
  generate_sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build_and_package]
    # Without `if: always() && ...`, GitHub Actions skips this job when
    # ANY upstream `needs` job used a conditional `if:` — even if that
    # upstream succeeded. `build_and_package` uses `if: always() && ...`
    # so its downstream chain must opt back in. Same pattern for
    # `sign_artifacts` and `upload_to_release` below. Triggered the
    # v0.4.0 dispatch silently-skipping SBOM/sign/upload despite all
    # 5 build matrices succeeding.
    if: |
      always()
      && needs.build_and_package.result == 'success'
    outputs:
      sbom_artifact: sbom-${{ env.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-sbom-tools

      - name: Install SBOM tools
        # cargo-cyclonedx was dropped — its `--format json > file`
        # invocation produced a 0-byte file (the tool writes to its
        # own path, not stdout), and the cargo-metadata + jq fallback
        # below is fully sufficient for CycloneDX 1.4. Only cargo-sbom
        # remains; it's used for SPDX 2.3.
        run: |
          cargo install cargo-sbom --locked || true

      - name: Generate SPDX SBOM
        run: |
          cargo sbom --output-format spdx_json_2_3 > sbom.spdx.json || \
          cargo metadata --format-version 1 | jq '{
            spdxVersion: "SPDX-2.3",
            dataLicense: "CC0-1.0",
            SPDXID: "SPDXRef-DOCUMENT",
            name: "jarvy-sbom",
            documentNamespace: "https://github.com/Cliftonz/jarvy/releases/tag/${{ env.VERSION }}",
            packages: [.packages[] | {
              SPDXID: ("SPDXRef-Package-" + .name),
              name: .name,
              versionInfo: .version,
              downloadLocation: .repository,
              licenseDeclared: .license
            }]
          }' > sbom.spdx.json

      - name: Generate CycloneDX SBOM
        # The previous version called `cargo cyclonedx --format json >
        # sbom.cdx.json` and fell back to the metadata + jq path on
        # non-zero exit. Two bugs:
        #   1. `cargo cyclonedx` writes to <crate-name>.cdx.json by
        #      default and emits NOTHING to stdout. The shell redirect
        #      captured the (empty) stdout and produced a 0-byte
        #      sbom.cdx.json. The OR fallback never fired because
        #      cyclonedx exited 0.
        #   2. The signed-but-empty sbom.cdx.json then shipped to the
        #      release as 0 bytes (skipped by the upload step's `-s`
        #      filter), but its .sig/.pem/.bundle still uploaded —
        #      signatures over empty content, useless for verification.
        # Fix: drop cargo-cyclonedx entirely. The metadata + jq
        # fallback is a valid CycloneDX 1.4 doc and always works (jq
        # is preinstalled on ubuntu-latest, cargo-metadata always
        # produces valid JSON). One code path, no fallbacks, always
        # produces a non-empty file.
        run: |
          set -euo pipefail
          cargo metadata --format-version 1 | jq '{
            bomFormat: "CycloneDX",
            specVersion: "1.4",
            version: 1,
            metadata: {
              timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
              component: {
                type: "application",
                name: "jarvy",
                version: "${{ env.VERSION }}"
              }
            },
            components: [.packages[] | {
              type: "library",
              name: .name,
              version: .version,
              purl: ("pkg:cargo/" + .name + "@" + .version),
              licenses: [{license: {id: .license}}]
            }]
          }' > sbom.cdx.json

      - name: Verify SBOM outputs are non-empty + parseable
        # Belt-and-braces: catch any future SBOM-generator regression
        # before it leaks into a release. Both files must exist, be
        # non-empty, and parse as JSON.
        run: |
          set -euo pipefail
          for f in sbom.spdx.json sbom.cdx.json; do
            if [ ! -s "$f" ]; then
              echo "::error::$f is missing or empty"
              exit 1
            fi
            if ! jq -e '.' "$f" >/dev/null; then
              echo "::error::$f is not valid JSON"
              exit 1
            fi
            echo "✅ $f: $(wc -c < "$f") bytes, valid JSON"
          done

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom-${{ env.VERSION }}
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90

  # Sign all release artifacts with Sigstore
  sign_artifacts:
    name: Sign Artifacts (Sigstore)
    runs-on: ubuntu-latest
    needs: [build_and_package, generate_sbom]
    if: |
      always()
      && needs.build_and_package.result == 'success'
      && needs.generate_sbom.result == 'success'
    permissions:
      contents: write
      id-token: write  # Required for Sigstore OIDC
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ env.VERSION }}
          path: artifacts/sbom

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with Sigstore
        run: |
          # Find all artifacts to sign
          find artifacts -type f \( -name 'jarvy*' -o -name 'sbom.*' \) | while read -r file; do
            # Skip signature and certificate files
            if [[ "$file" =~ \.(sig|pem|bundle)$ ]]; then
              continue
            fi

            echo "Signing: $file"

            # Sign with keyless Sigstore (OIDC-based)
            cosign sign-blob --yes "$file" \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              --bundle "${file}.bundle"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: signed-artifacts-${{ env.VERSION }}
          path: |
            artifacts/**/*.sig
            artifacts/**/*.pem
            artifacts/**/*.bundle
          retention-days: 90

  upload_to_release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs: [build_and_package, generate_sbom, sign_artifacts]
    if: |
      always()
      && needs.build_and_package.result == 'success'
      && needs.generate_sbom.result == 'success'
      && needs.sign_artifacts.result == 'success'
    steps:
      # Checkout so we have CHANGELOG.md + git history for release-note
      # extraction. `fetch-depth: 0` is needed because `git describe` walks
      # the full history to find the previous tag for the compare link.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ env.VERSION }}
          path: sbom

      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          name: signed-artifacts-${{ env.VERSION }}
          path: signatures

      - name: Create attestation for all builds
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: artifacts/**/jarvy*

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f -name 'jarvy*' ! -name '*.sig' ! -name '*.pem' ! -name '*.bundle' | while read -r file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done
          # Also checksum SBOMs
          cd ../sbom
          sha256sum sbom.* >> ../artifacts/SHA256SUMS.txt
          mv ../artifacts/SHA256SUMS.txt ../

      # Pre-release detection (mirrors omni-infra-provider-truenas).
      # Semver pre-release tags (vX.Y.Z-rc.N, -beta.N, -alpha.N) carry a `-`
      # after the version core; stable tags never do. is_prerelease is consumed
      # by `gh release create --prerelease` to keep the release out of
      # "Latest", and by the install-script channel filter so users on the
      # stable channel are not auto-served pre-release artifacts.
      - name: Detect prerelease
        id: detect_prerelease
        run: |
          TAG="${VERSION}"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is a pre-release (will not be marked latest)."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is a stable release."
          fi

      # Build the release body (mirrors omni-infra-provider-truenas).
      # Stable releases pull their narrative from CHANGELOG.md via awk;
      # pre-releases (no CHANGELOG entry by policy — see CHANGELOG.md
      # "Policy" section) fall through to a git-log fallback. Either way,
      # we append a "Full Changelog" compare link plus Jarvy's standing
      # install/security/SBOM footer. Result is written to RELEASE_NOTES.md
      # and consumed by `body_path:` on softprops/action-gh-release below.
      - name: Build release notes
        run: |
          set -euo pipefail
          TAG="${VERSION}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          # Extract the section for this version from CHANGELOG.md.
          # Matches from "## [vX.Y.Z]" (with or without leading 'v') to the
          # next "## [" or end of file.
          STRIPPED="${TAG#v}"
          NOTES=$(awk "/^## \\[v?${STRIPPED}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md || true)

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry for ${TAG}. Falling back to git log (expected for pre-release tags)."
            RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi

          BASE="${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}"

          {
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${BASE}...${TAG}"
            echo ""
            echo "## Installation"
            echo ""
            echo "### Quick Install (Unix)"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/Cliftonz/jarvy/main/dist/scripts/install.sh | bash"
            echo '```'
            echo ""
            echo "### Quick Install (Windows PowerShell)"
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/Cliftonz/jarvy/main/dist/scripts/install.ps1 | iex"
            echo '```'
            echo ""
            echo "### Homebrew"
            echo '```bash'
            echo "brew install Cliftonz/tap/jarvy"
            echo '```'
            echo ""
            echo "### Cargo"
            echo '```bash'
            echo "cargo install jarvy"
            echo '```'
            echo ""
            echo "### Early-Release Channel"
            echo "Pre-release tags (\`-rc.N\`, \`-beta.N\`) are routed through the beta channel."
            echo "Opt in: \`JARVY_CHANNEL=beta\` on the install script, or \`jarvy update --channel beta\`."
            echo "See [docs/release-testing.md](https://github.com/Cliftonz/jarvy/blob/main/docs/release-testing.md)."
            echo ""
            echo "See [installation docs](https://github.com/Cliftonz/jarvy#installation) for more options."
            echo ""
            echo "## Security"
            echo ""
            echo "### Verify Signatures"
            echo "All release artifacts are signed with [Sigstore](https://sigstore.dev/) keyless OIDC. Verify any artifact:"
            echo ""
            echo '```bash'
            echo "# Substitute a triple that matches your platform, e.g."
            echo "# aarch64-apple-darwin, x86_64-unknown-linux-musl,"
            echo "# aarch64-unknown-linux-gnu, x86_64-pc-windows-msvc (.zip)."
            echo "ARTIFACT=jarvy-${TAG}-x86_64-unknown-linux-musl.tar.gz"
            echo "BASE=https://github.com/Cliftonz/jarvy/releases/download/${TAG}"
            echo "curl -LO \$BASE/\$ARTIFACT"
            echo "curl -LO \$BASE/\$ARTIFACT.sig"
            echo "curl -LO \$BASE/\$ARTIFACT.pem"
            echo "cosign verify-blob \\"
            echo "  --signature \$ARTIFACT.sig \\"
            echo "  --certificate \$ARTIFACT.pem \\"
            echo "  --certificate-identity-regexp '^https://github\\.com/Cliftonz/jarvy/\\.github/workflows/release\\.yml@refs/tags/v[0-9.]+(-[A-Za-z0-9.]+)?$' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "  \$ARTIFACT"
            echo '```'
            echo ""
            echo "### Tag Signature"
            echo "This release was cut from a signed git tag. Verify with:"
            echo '```bash'
            echo "git -c gpg.ssh.allowedSignersFile=.github/allowed_signers tag --verify ${TAG}"
            echo '```'
            echo ""
            echo "### SBOM"
            echo "Software Bill of Materials in SPDX 2.3 (\`sbom.spdx.json\`) and CycloneDX 1.4 (\`sbom.cdx.json\`)."
            echo ""
            echo "### Checksums"
            echo "SHA256 checksums for all artifacts are in \`SHA256SUMS.txt\`."
          } > RELEASE_NOTES.md

          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      # Two-step release: create the draft release shell first, then
      # upload assets serially. The previous single-step
      # softprops/action-gh-release@v2 invocation hit a recurring
      # parallel-upload race where one of N concurrent worker uploads
      # would fail with "Validation Failed: size must be greater than
      # or equal to 1" and the action's overall exit code became 1
      # even though most assets uploaded. This dropped 7-13 sig
      # variants per release across rc.1, rc.3, and rc.5. Serial
      # upload eliminates the race; per-file retry handles transient
      # GitHub API blips. Tradeoff: ~50 files × ~1s/upload = ~1 min
      # of upload time vs the parallel ~10s, in exchange for a
      # complete release.

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "${{ steps.detect_prerelease.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # If the release already exists from a previous failed run,
          # delete it so we start clean. (verify_tag would have caught
          # a fully-published release; a draft is still allowed here.)
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists (likely a draft from a previous failed upload); deleting before recreating."
            gh release delete "${VERSION}" --yes --cleanup-tag=false
          fi
          gh release create "${VERSION}" \
            --draft \
            $PRERELEASE_FLAG \
            --notes-file RELEASE_NOTES.md \
            --title "${VERSION}"

      - name: Upload assets serially with retry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          upload_one() {
            local file="$1"
            local attempts=3
            local i=0
            while [ "$i" -lt "$attempts" ]; do
              if gh release upload "${VERSION}" "$file" --clobber; then
                echo "✅ uploaded $file"
                return 0
              fi
              i=$((i + 1))
              echo "⚠️  upload of $file failed (attempt $i/$attempts); retrying in 3s..."
              sleep 3
            done
            echo "::error::Failed to upload $file after $attempts attempts"
            return 1
          }

          # Collect every file we want shipped, then upload one at a time.
          # Globstar handles `artifacts/**/jarvy*`; the loop dedupes by
          # checking it's a regular non-empty file.
          declare -a files
          for f in artifacts/**/jarvy*; do
            [ -f "$f" ] && [ -s "$f" ] && files+=("$f")
          done
          for f in sbom/sbom.*; do
            [ -f "$f" ] && [ -s "$f" ] && files+=("$f")
          done
          for f in signatures/**/*.sig signatures/**/*.pem signatures/**/*.bundle; do
            [ -f "$f" ] && [ -s "$f" ] && files+=("$f")
          done
          if [ -f SHA256SUMS.txt ] && [ -s SHA256SUMS.txt ]; then
            files+=(SHA256SUMS.txt)
          fi

          echo "Uploading ${#files[@]} assets to ${VERSION}..."
          for f in "${files[@]}"; do
            upload_one "$f"
          done
          echo "All ${#files[@]} assets uploaded successfully."

      # Promote the draft to a published release. Stable releases also
      # get marked `--latest`; pre-releases (rc / beta / alpha) leave
      # the GitHub "Latest" pin alone so users on the stable channel
      # aren't auto-served a pre-release artifact. v0.4.0 was the
      # canary that exposed the missing step: workflow created the
      # draft + uploaded 61 assets, then stopped without publishing,
      # forcing a manual `gh release edit --draft=false`.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ steps.detect_prerelease.outputs.is_prerelease }}" = "true" ]; then
            gh release edit "${VERSION}" --draft=false
            echo "Pre-release ${VERSION} published (not pinned as Latest)."
          else
            gh release edit "${VERSION}" --draft=false --latest
            echo "Stable release ${VERSION} published and pinned as Latest."
          fi

      # `release: published` does NOT fire for downstream workflows when
      # the transition is driven by `GITHUB_TOKEN` — GitHub blocks
      # workflow-to-workflow triggering via the built-in token to prevent
      # recursion. `workflow_dispatch` is the documented exception, so
      # every downstream validation workflow keyed on `release: published`
      # must be dispatched explicitly. Without this, Paths 1/2/3/4/5/8
      # silently skip every release we cut (verified missing on rc.1,
      # rc.4 while rc.8 of v0.2.1 — which was published by a human PAT —
      # did fire the event).
      #
      # Coverage map (per docs/release-testing.md):
      #   release-paths.yml   → Paths 2 (upgrade), 3 (skip-version), 4 (rollback)
      #   verify-release.yml  → Path 8 (asset download sweep)
      #   prerelease-soak.yml → Paths 1 (fresh install), 5 (multi-tool),
      #                         6/7 (MAJOR-only). Force=true bypasses the
      #                         24h age gate so the soak workflow also
      #                         doubles as immediate per-tag validation;
      #                         the scheduled cron still re-runs at 24h+
      #                         for the wall-clock endurance signal.
      - name: Dispatch downstream validation workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Paths 2/3/4 — upgrade / skip-version / rollback.
          gh workflow run release-paths.yml \
            --repo "${{ github.repository }}" \
            --ref "${VERSION}" \
            -f target_tag="${VERSION}"
          echo "Dispatched release-paths.yml against ${VERSION}."

          # Path 8 — asset download sweep. Hard-fails on any missing
          # checksum, signature, or SBOM entry.
          gh workflow run verify-release.yml \
            --repo "${{ github.repository }}" \
            --ref "${VERSION}" \
            -f tag="${VERSION}"
          echo "Dispatched verify-release.yml against ${VERSION}."

          # Paths 1/5 (and 6/7 on MAJOR bumps) — dispatch with
          # `force=true` so the workflow skips its own 24h supersession
          # gate. The scheduled cron continues to fire at t≥24h as the
          # wall-clock endurance check.
          gh workflow run prerelease-soak.yml \
            --repo "${{ github.repository }}" \
            --ref "${VERSION}" \
            -f tag="${VERSION}" \
            -f force=true
          echo "Dispatched prerelease-soak.yml against ${VERSION} (force=true)."