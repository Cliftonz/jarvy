name: Build and Release

# PRD-020: Security Scanning Infrastructure
# - Sigstore signing for all release artifacts
# - SBOM generation (SPDX and CycloneDX)
# - Build provenance attestation

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        default: ''

permissions:
  contents: read

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}
  CARGO_TERM_COLOR: always

jobs:
  # PRD-051: Tag-signing enforcement + fail-fast guards.
  # Mirrors the omni-infra-provider-truenas release workflow: refuses any
  # tag-triggered release whose tag is not signed (GPG or SSH), and bails
  # out before any build work if the release already exists (assets are
  # immutable; you must delete the release before re-running).
  # Skipped on workflow_dispatch — manual runs use the operator's audit trail.
  verify_tag:
    name: Verify Tag Signature
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # actions/checkout does not fetch tag *objects* by default — only
          # refs/heads. `git tag --verify` then fails with "cannot verify a
          # non-tag object of type commit" because the annotated tag object
          # isn't in the local clone.
          fetch-tags: true

      # Even with fetch-tags: true, actions/checkout creates a LIGHTWEIGHT
      # local tag when the workflow is triggered by a tag push — the
      # annotated tag object is replaced with a direct ref to the commit.
      # See actions/checkout#1467. Re-fetch the annotated tag object
      # explicitly so `git tag --verify` can read its signature.
      - name: Refetch annotated tag object
        run: git fetch origin "refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}" --force

      # SSH-signed tags require an allowed-signers file so git can map a
      # signature back to a trusted identity. The file is committed to the
      # repo at .github/allowed_signers; rotate entries by PR if a
      # maintainer's signing key changes.
      - name: Configure SSH allowed signers
        run: |
          git config gpg.ssh.allowedSignersFile "${GITHUB_WORKSPACE}/.github/allowed_signers"

      - name: Verify tag is signed
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if ! git tag --verify "${TAG}" 2>&1; then
            echo "::error::Tag ${TAG} is not signed or the signature did not verify. Re-tag with 'git tag -s ${TAG}' from a trusted signing key, or 'git -c gpg.format=ssh tag -s ${TAG}' for SSH signing. Ensure the public key is registered as a Signing key on the maintainer's GitHub profile and listed in .github/allowed_signers."
            exit 1
          fi
          echo "OK: tag ${TAG} is signed and verifies"

      # Fail fast: if a release already exists for this tag, assets are
      # immutable and cannot be overwritten. Delete the release first if
      # you need to re-run.
      - name: Check for existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "::error::Release ${{ github.ref_name }} already exists. Immutable releases cannot be updated. To re-release: gh release delete ${{ github.ref_name }} --yes && git push origin :refs/tags/${{ github.ref_name }}"
            exit 1
          fi

  build_and_package:
    name: Build & Package
    runs-on: ${{ matrix.platform }}
    needs: [verify_tag]
    # verify_tag is skipped on workflow_dispatch; allow that to count as success.
    if: always() && (needs.verify_tag.result == 'success' || needs.verify_tag.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_paths: target/release/jarvy*_aarch64.dmg
            build_args: ""
            cross: false
          - platform: macos-13
            artifact_paths: target/release/jarvy*_x64.dmg
            build_args: ""
            cross: false
          - platform: ubuntu-latest
            artifact_paths: |
              target/x86_64-unknown-linux-musl/release/jarvy*_amd64.deb
              target/x86_64-unknown-linux-musl/release/jarvy*_x86_64.AppImage
              target/x86_64-unknown-linux-musl/generate-rpm/jarvy*.rpm
            build_args: "--target=x86_64-unknown-linux-musl"
            cross: true
            apt: musl-tools
            sysroot: ""
            pkg_arch: musl
            rust_target: x86_64-unknown-linux-musl
          - platform: windows-latest
            artifact_paths: |
              target/release/jarvy*_x64_en-US.msi
              target/release/jarvy*_x64-setup.exe
            build_args: ""
            cross: false
          - platform: ubuntu-latest
            artifact_paths: |
              target/aarch64-unknown-linux-gnu/release/jarvy*.deb
              target/aarch64-unknown-linux-gnu/generate-rpm/jarvy*.rpm
            build_args: "--target=aarch64-unknown-linux-gnu"
            cross: true
            apt: gcc-aarch64-linux-gnu
            sysroot: /usr/aarch64-linux-gnu/
            pkg_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - platform: ubuntu-latest
            artifact_paths: |
              target/armv7-unknown-linux-gnueabihf/release/jarvy*.deb
              target/armv7-unknown-linux-gnueabihf/generate-rpm/jarvy*.rpm
            build_args: "--target=armv7-unknown-linux-gnueabihf"
            cross: true
            apt: gcc-arm-linux-gnueabihf
            sysroot: /usr/arm-linux-gnueabihf/
            pkg_arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v4

      - name: Install cross dependencies (cross only)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential curl ${{ matrix.apt }}
      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Rust target (cross only)
        if: matrix.cross
        run: rustup target add ${{ matrix.rust_target }}

      - name: Set PKG_CONFIG_SYSROOT_DIR (cross only)
        if: matrix.cross && matrix.sysroot != ''
        run: echo "PKG_CONFIG_SYSROOT_DIR=${{ matrix.sysroot }}" >> $GITHUB_ENV

      - name: Install app dependencies
        run: cargo install cargo-packager cargo-generate-rpm --locked

      - name: Build the application
        run: cargo build --release ${{ matrix.build_args }}

      - name: Package Binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ] && [ "${{ matrix.sysroot }}" != "" ]; then
            cargo packager --target=${{ matrix.rust_target }} --formats=deb --release --verbose
          elif [ "${{ matrix.cross }}" = "true" ] && [ -z "${{ matrix.sysroot }}" ]; then
            cargo packager --target=${{ matrix.rust_target }} --release --verbose
          else
            cargo packager --release --verbose
          fi
      - name: Package RPM
        if: matrix.platform == 'ubuntu-latest'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo generate-rpm --target=${{ matrix.rust_target }}
          else
            cargo generate-rpm
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}${{ matrix.cross && format('-{0}', matrix.pkg_arch) || '' }}-release-artifacts
          path: ${{ matrix.artifact_paths }}

  # Generate Software Bill of Materials (SBOM)
  generate_sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build_and_package]
    outputs:
      sbom_artifact: sbom-${{ env.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-sbom-tools

      - name: Install SBOM tools
        run: |
          cargo install cargo-sbom --locked || true
          cargo install cargo-cyclonedx --locked || true

      - name: Generate SPDX SBOM
        run: |
          cargo sbom --output-format spdx_json_2_3 > sbom.spdx.json || \
          cargo metadata --format-version 1 | jq '{
            spdxVersion: "SPDX-2.3",
            dataLicense: "CC0-1.0",
            SPDXID: "SPDXRef-DOCUMENT",
            name: "jarvy-sbom",
            documentNamespace: "https://github.com/bearbinary/jarvy/releases/tag/${{ env.VERSION }}",
            packages: [.packages[] | {
              SPDXID: ("SPDXRef-Package-" + .name),
              name: .name,
              versionInfo: .version,
              downloadLocation: .repository,
              licenseDeclared: .license
            }]
          }' > sbom.spdx.json

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json > sbom.cdx.json 2>/dev/null || \
          cargo metadata --format-version 1 | jq '{
            bomFormat: "CycloneDX",
            specVersion: "1.4",
            version: 1,
            metadata: {
              timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
              component: {
                type: "application",
                name: "jarvy",
                version: "${{ env.VERSION }}"
              }
            },
            components: [.packages[] | {
              type: "library",
              name: .name,
              version: .version,
              purl: ("pkg:cargo/" + .name + "@" + .version),
              licenses: [{license: {id: .license}}]
            }]
          }' > sbom.cdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.VERSION }}
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90

  # Sign all release artifacts with Sigstore
  sign_artifacts:
    name: Sign Artifacts (Sigstore)
    runs-on: ubuntu-latest
    needs: [build_and_package, generate_sbom]
    permissions:
      contents: write
      id-token: write  # Required for Sigstore OIDC
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ env.VERSION }}
          path: artifacts/sbom

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with Sigstore
        run: |
          # Find all artifacts to sign
          find artifacts -type f \( -name 'jarvy*' -o -name 'sbom.*' \) | while read -r file; do
            # Skip signature and certificate files
            if [[ "$file" =~ \.(sig|pem|bundle)$ ]]; then
              continue
            fi

            echo "Signing: $file"

            # Sign with keyless Sigstore (OIDC-based)
            cosign sign-blob --yes "$file" \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              --bundle "${file}.bundle"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifacts-${{ env.VERSION }}
          path: |
            artifacts/**/*.sig
            artifacts/**/*.pem
            artifacts/**/*.bundle
          retention-days: 90

  upload_to_release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs: [build_and_package, generate_sbom, sign_artifacts]
    steps:
      # Checkout so we have CHANGELOG.md + git history for release-note
      # extraction. `fetch-depth: 0` is needed because `git describe` walks
      # the full history to find the previous tag for the compare link.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ env.VERSION }}
          path: sbom

      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          name: signed-artifacts-${{ env.VERSION }}
          path: signatures

      - name: Create attestation for all builds
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/**/jarvy*

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f -name 'jarvy*' ! -name '*.sig' ! -name '*.pem' ! -name '*.bundle' | while read -r file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done
          # Also checksum SBOMs
          cd ../sbom
          sha256sum sbom.* >> ../artifacts/SHA256SUMS.txt
          mv ../artifacts/SHA256SUMS.txt ../

      # Pre-release detection (mirrors omni-infra-provider-truenas).
      # Semver pre-release tags (vX.Y.Z-rc.N, -beta.N, -alpha.N) carry a `-`
      # after the version core; stable tags never do. is_prerelease is consumed
      # by `gh release create --prerelease` to keep the release out of
      # "Latest", and by the install-script channel filter so users on the
      # stable channel are not auto-served pre-release artifacts.
      - name: Detect prerelease
        id: detect_prerelease
        run: |
          TAG="${VERSION}"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is a pre-release (will not be marked latest)."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is a stable release."
          fi

      # Build the release body (mirrors omni-infra-provider-truenas).
      # Stable releases pull their narrative from CHANGELOG.md via awk;
      # pre-releases (no CHANGELOG entry by policy — see CHANGELOG.md
      # "Policy" section) fall through to a git-log fallback. Either way,
      # we append a "Full Changelog" compare link plus Jarvy's standing
      # install/security/SBOM footer. Result is written to RELEASE_NOTES.md
      # and consumed by `body_path:` on softprops/action-gh-release below.
      - name: Build release notes
        run: |
          set -euo pipefail
          TAG="${VERSION}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          # Extract the section for this version from CHANGELOG.md.
          # Matches from "## [vX.Y.Z]" (with or without leading 'v') to the
          # next "## [" or end of file.
          STRIPPED="${TAG#v}"
          NOTES=$(awk "/^## \\[v?${STRIPPED}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md || true)

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry for ${TAG}. Falling back to git log (expected for pre-release tags)."
            RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi

          BASE="${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}"

          {
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${BASE}...${TAG}"
            echo ""
            echo "## Installation"
            echo ""
            echo "### Quick Install (Unix)"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/bearbinary/jarvy/main/dist/scripts/install.sh | bash"
            echo '```'
            echo ""
            echo "### Quick Install (Windows PowerShell)"
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/bearbinary/jarvy/main/dist/scripts/install.ps1 | iex"
            echo '```'
            echo ""
            echo "### Homebrew"
            echo '```bash'
            echo "brew install bearbinary/tap/jarvy"
            echo '```'
            echo ""
            echo "### Cargo"
            echo '```bash'
            echo "cargo install jarvy"
            echo '```'
            echo ""
            echo "### Early-Release Channel"
            echo "Pre-release tags (\`-rc.N\`, \`-beta.N\`) are routed through the beta channel."
            echo "Opt in: \`JARVY_CHANNEL=beta\` on the install script, or \`jarvy update --channel beta\`."
            echo "See [docs/release-testing.md](https://github.com/bearbinary/jarvy/blob/main/docs/release-testing.md)."
            echo ""
            echo "See [installation docs](https://github.com/bearbinary/jarvy#installation) for more options."
            echo ""
            echo "## Security"
            echo ""
            echo "### Verify Signatures"
            echo "All release artifacts are signed with [Sigstore](https://sigstore.dev/) keyless OIDC. Verify any artifact:"
            echo ""
            echo '```bash'
            echo "ARTIFACT=jarvy-linux-x86_64.tar.gz"
            echo "BASE=https://github.com/bearbinary/jarvy/releases/download/${TAG}"
            echo "curl -LO \$BASE/\$ARTIFACT"
            echo "curl -LO \$BASE/\$ARTIFACT.sig"
            echo "curl -LO \$BASE/\$ARTIFACT.pem"
            echo "cosign verify-blob \\"
            echo "  --signature \$ARTIFACT.sig \\"
            echo "  --certificate \$ARTIFACT.pem \\"
            echo "  --certificate-identity-regexp 'https://github.com/bearbinary/jarvy' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "  \$ARTIFACT"
            echo '```'
            echo ""
            echo "### Tag Signature"
            echo "This release was cut from a signed git tag. Verify with:"
            echo '```bash'
            echo "git -c gpg.ssh.allowedSignersFile=.github/allowed_signers tag --verify ${TAG}"
            echo '```'
            echo ""
            echo "### SBOM"
            echo "Software Bill of Materials in SPDX 2.3 (\`sbom.spdx.json\`) and CycloneDX 1.4 (\`sbom.cdx.json\`)."
            echo ""
            echo "### Checksums"
            echo "SHA256 checksums for all artifacts are in \`SHA256SUMS.txt\`."
          } > RELEASE_NOTES.md

          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.detect_prerelease.outputs.is_prerelease }}
          tag_name: ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/jarvy*
            sbom/sbom.*
            signatures/**/*.sig
            signatures/**/*.pem
            signatures/**/*.bundle
            SHA256SUMS.txt