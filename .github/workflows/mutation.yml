name: Mutation Testing

on:
  schedule:
    # Run weekly (Saturday at 3 AM UTC)
    - cron: '0 3 * * 6'
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to test (comma-separated, e.g., "config,tools/common")'
        required: false
        default: ''

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Run mutation testing (critical modules)
        run: |
          MODULES="${{ github.event.inputs.modules }}"
          if [ -z "$MODULES" ]; then
            # Default critical modules
            cargo mutants --timeout 300 --jobs 4 \
              -f src/config.rs \
              -f src/tools/common.rs \
              -- --lib
          else
            # User-specified modules
            IFS=',' read -ra MODULE_ARRAY <<< "$MODULES"
            ARGS=""
            for module in "${MODULE_ARRAY[@]}"; do
              ARGS="$ARGS -f src/${module}.rs"
            done
            cargo mutants --timeout 300 --jobs 4 $ARGS -- --lib
          fi
        continue-on-error: true

      - name: Generate mutation report
        run: |
          echo "## Mutation Testing Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f mutants.out/caught.txt ]; then
            CAUGHT=$(wc -l < mutants.out/caught.txt)
            echo "### Caught Mutations: $CAUGHT" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f mutants.out/missed.txt ]; then
            MISSED=$(wc -l < mutants.out/missed.txt)
            echo "### Missed Mutations: $MISSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$MISSED" -gt 0 ]; then
              echo "<details><summary>Missed mutations (tests did not catch)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              head -50 mutants.out/missed.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ -f mutants.out/timeout.txt ]; then
            TIMEOUT=$(wc -l < mutants.out/timeout.txt)
            if [ "$TIMEOUT" -gt 0 ]; then
              echo "### Timeouts: $TIMEOUT" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Calculate mutation score
          if [ -f mutants.out/caught.txt ] && [ -f mutants.out/missed.txt ]; then
            CAUGHT=$(wc -l < mutants.out/caught.txt)
            MISSED=$(wc -l < mutants.out/missed.txt)
            TOTAL=$((CAUGHT + MISSED))
            if [ "$TOTAL" -gt 0 ]; then
              SCORE=$(echo "scale=1; $CAUGHT * 100 / $TOTAL" | bc)
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Mutation Score: ${SCORE}%" >> $GITHUB_STEP_SUMMARY

              if (( $(echo "$SCORE < 60" | bc -l) )); then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "⚠️ Mutation score is below 60% target" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          fi
        continue-on-error: true

      - name: Upload mutation results
        uses: actions/upload-artifact@v7
        with:
          name: mutation-results
          path: mutants.out/
          retention-days: 30
