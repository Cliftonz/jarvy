site_name: Jarvy
site_url: https://jarvy.dev
site_description: >-
  Jarvy is a fast, cross-platform CLI that provisions a complete local
  development environment from a single declarative jarvy.toml file —
  native package managers, no cloud, MIT-licensed.
site_author: Zac Clifton
repo_url: https://github.com/Cliftonz/jarvy
repo_name: Cliftonz/jarvy
edit_uri: ""

copyright: Copyright &copy; 2025-2026 Zac Clifton

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - social:
      cards_layout_options:
        background_color: "#1a1f3a"
        color: "#FFFFFF"
  - tags

# Build hooks. mkdocs_hooks.copy the dot-prefixed docs/.well-known/ tree
# into the site output (MkDocs skips dot-dirs, so it needs a post-build copy).
hooks:
  - scripts/mkdocs_hooks.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cliftonz/jarvy
      name: Jarvy on GitHub
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/intent/tweet?text=Check%20out%20Jarvy%20%E2%80%94%20dev%20environments%20as%20code&url=https://jarvy.dev
      name: Share on X
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated
  version:
    provider: mike
    default: latest
  # Plausible Analytics — privacy-friendly, GDPR-safe, no cookies.
  # Configure the domain to match the deployed site.
  analytics:
    provider: custom
    plausible:
      domain: jarvy.dev
      script: https://plausible.io/js/script.js

extra_css:
  - assets/extra.css
  - https://cdn.jsdelivr.net/npm/asciinema-player@3.7.0/dist/bundle/asciinema-player.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/asciinema-player@3.7.0/dist/bundle/asciinema-player.min.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

