{{- if eq .Values.secrets.strategy "externalSecrets" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.grafanaTokenSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    {{- toYaml .Values.secrets.externalSecrets.secretStoreRef | nindent 4 }}
  target:
    name: {{ .Values.secrets.grafanaTokenSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.secrets.grafanaTokenSecretKey }}
      remoteRef:
        {{- toYaml .Values.secrets.externalSecrets.grafanaToken.remoteRef | nindent 8 }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.piiSaltSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    {{- toYaml .Values.secrets.externalSecrets.secretStoreRef | nindent 4 }}
  target:
    name: {{ .Values.secrets.piiSaltSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.secrets.piiSaltSecretKey }}
      remoteRef:
        {{- toYaml .Values.secrets.externalSecrets.piiSalt.remoteRef | nindent 8 }}
{{- else if eq .Values.secrets.strategy "existing" }}
{{- /*
  No-op: operator pre-created the Secrets named below. The
  Deployment template references them by name; missing Secrets
  surface as CrashLoopBackOff with `MountVolume.SetUp failed for
  volume ... secret not found`. This is the trade-off for the
  "BYO secrets" strategy.
*/ -}}
{{- else if eq .Values.secrets.strategy "inline" }}
{{- if not .Values.secrets.inline.acceptRisk }}
{{- fail "secrets.strategy=inline ships plaintext secrets in `helm get values` output. Set secrets.inline.acceptRisk: true to explicitly confirm this is a dev cluster, or switch to externalSecrets (production) or existing (BYO secrets)." }}
{{- end }}
{{- if not .Values.secrets.inline.grafanaToken }}
{{- fail "secrets.inline.grafanaToken must be set when secrets.strategy=inline" }}
{{- end }}
{{- if not .Values.secrets.inline.piiSalt }}
{{- fail "secrets.inline.piiSalt must be set when secrets.strategy=inline" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.grafanaTokenSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ .Values.secrets.grafanaTokenSecretKey }}: {{ .Values.secrets.inline.grafanaToken | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.piiSaltSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ .Values.secrets.piiSaltSecretKey }}: {{ .Values.secrets.inline.piiSalt | b64enc }}
{{- else }}
{{- fail (printf "secrets.strategy must be one of externalSecrets|existing|inline; got %q" .Values.secrets.strategy) }}
{{- end }}
