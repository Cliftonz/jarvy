{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.traefikMiddlewares.enabled }}
# Traefik Middleware bridge. Gateway API does not yet have first-class
# rate limit or body cap; Traefik supplies them via Middleware CRDs
# attached to HTTPRoute via ExtensionRef. When the chart runs on a
# different GatewayClass (Envoy Gateway, Cilium, Istio), set
# `gatewayApi.traefikMiddlewares.enabled: false` and supply your
# implementation's equivalents via `gatewayApi.httpRoute.extraFilters`.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}-ratelimit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  rateLimit:
    average: {{ .Values.gatewayApi.traefikMiddlewares.rateLimit.average }}
    period: {{ .Values.gatewayApi.traefikMiddlewares.rateLimit.period }}
    burst: {{ .Values.gatewayApi.traefikMiddlewares.rateLimit.burst }}
    sourceCriterion:
      ipStrategy:
        depth: {{ .Values.gatewayApi.traefikMiddlewares.rateLimit.ipStrategyDepth }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}-bodylimit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  buffering:
    maxRequestBodyBytes: {{ .Values.gatewayApi.traefikMiddlewares.bodyLimit.maxRequestBodyBytes }}
    memRequestBodyBytes: {{ .Values.gatewayApi.traefikMiddlewares.bodyLimit.memRequestBodyBytes }}
{{- end }}
