apiVersion: v1
kind: Service
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "jarvy-telemetry-forwarder.selectorLabels" . | nindent 4 }}
  ports:
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: self-metrics, port: 8888, targetPort: self-metrics }
