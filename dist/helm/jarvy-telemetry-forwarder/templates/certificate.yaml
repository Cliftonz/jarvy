{{- if and .Values.tls.certManager.enabled .Values.gatewayApi.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
spec:
  secretName: {{ include "jarvy-telemetry-forwarder.fullname" . }}-tls
  issuerRef:
    {{- toYaml .Values.tls.certManager.issuerRef | nindent 4 }}
  dnsNames:
    {{- toYaml .Values.gatewayApi.httpRoute.hostnames | nindent 4 }}
{{- end }}
