{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with .Values.gatewayApi.gateway.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  gatewayClassName: {{ .Values.gatewayApi.gateway.gatewayClassName }}
  listeners:
    {{- range .Values.gatewayApi.gateway.listeners }}
    - name: {{ .name }}
      port: {{ .port }}
      protocol: {{ .protocol }}
      {{- if .tls }}
      tls:
        mode: {{ .tls.mode | default "Terminate" }}
        {{- if $.Values.tls.certManager.enabled }}
        certificateRefs:
          - kind: Secret
            name: {{ include "jarvy-telemetry-forwarder.fullname" $ }}-tls
        {{- else if $.Values.tls.existingSecretName }}
        certificateRefs:
          - kind: Secret
            name: {{ $.Values.tls.existingSecretName }}
        {{- end }}
      {{- end }}
      {{- with .allowedRoutes }}
      allowedRoutes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
