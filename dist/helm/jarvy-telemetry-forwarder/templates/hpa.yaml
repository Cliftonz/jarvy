{{- if .Values.collector.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  minReplicas: {{ .Values.collector.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.collector.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.collector.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.collector.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.collector.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- if .Values.collector.autoscaling.queueDepth.enabled }}
    - type: Pods
      pods:
        metric:
          name: {{ .Values.collector.autoscaling.queueDepth.metricName }}
        target:
          type: AverageValue
          averageValue: {{ .Values.collector.autoscaling.queueDepth.averageValue | quote }}
    {{- end }}
  {{- with .Values.collector.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
