# jarvy.toml - Development environment for Jarvy
#
# Run: jarvy setup
# This will install all tools needed to develop, build, and contribute to Jarvy.

[privileges]
use_sudo = true

[privileges.per_os]
linux = true
macos = false
windows = false

# =============================================================================
# Core Development Tools
# =============================================================================
[provisioner]
# Rust toolchain - required for building Jarvy (edition 2024, rust-version 1.85)
rust = "latest"

# Version control
git = "latest"
git-lfs = "latest"

# GitHub CLI for PRs, issues, and workflows
gh = "latest"

# =============================================================================
# Code Quality & Linting
# =============================================================================
# Shell script linting (used by pre-commit)
shellcheck = "latest"
shfmt = "latest"

# YAML/Markdown linting (used by pre-commit)
yamllint = "latest"

# GitHub Actions linting
actionlint = "latest"

# Dockerfile linting
hadolint = "latest"

# =============================================================================
# Security Scanning
# =============================================================================
# Secret detection (used by pre-commit)
gitleaks = "latest"

# Vulnerability scanning
trivy = "latest"
grype = "latest"

# SBOM generation
syft = "latest"

# =============================================================================
# Developer Experience
# =============================================================================
# Modern CLI alternatives
ripgrep = "latest"    # rg - fast code search
fd = "latest"         # fast file finder
bat = "latest"        # cat with syntax highlighting
jq = "latest"         # JSON processor
yq = "latest"         # YAML processor
fzf = "latest"        # fuzzy finder

# Git enhancements
lazygit = "latest"    # Git TUI
delta = "latest"      # Better git diffs

# Navigation & productivity
zoxide = "latest"     # Smart cd with frecency
eza = "latest"        # Modern ls replacement

# Process monitoring
btop = "latest"

# =============================================================================
# Hooks Configuration
# =============================================================================
[hooks]
post_setup = """
echo ""
echo "=========================================="
echo "  Jarvy development environment ready!"
echo "=========================================="
echo ""
echo "Next steps:"
echo "  1. Install pre-commit hooks: pip install pre-commit && pre-commit install"
echo "  2. Build the project:  jarvy run build"
echo "  3. Run the tests:      jarvy run test   (jarvy run test-lib for the quick loop)"
echo "  4. Full pre-push gate: jarvy run ci"
echo ""
echo "All commands: jarvy run   (tip: 'jarvy shell-init' gives you 'jr' as shorthand)"
echo ""
"""

[hooks.config]
timeout = 60
continue_on_error = true

# Configure git to use delta for diffs
[hooks.delta]
post_install = """
if command -v delta >/dev/null 2>&1; then
    git config --global core.pager delta
    git config --global interactive.diffFilter 'delta --color-only'
    git config --global delta.navigate true
    git config --global delta.side-by-side true
fi
"""

# =============================================================================
# Environment Variables
# =============================================================================
[env.vars]
# Rust configuration
CARGO_INCREMENTAL = "1"
RUSTFLAGS = "-C target-cpu=native"

# Better compiler errors
RUST_BACKTRACE = "1"

[env.config]
generate_dotenv = false
update_rc = false

# =============================================================================
# MCP Server Registration
#
# Auto-register the Jarvy MCP server (`jarvy mcp` over stdio) with each
# contributor's terminal AI agent on `jarvy setup`. The server exposes
# Jarvy's tools (list_tools, check_tool, install_tool, drift, roles,
# templates, services, …) so an agent in this repo can reason about
# and operate on the dev environment without manual config.
#
# scope = "project" writes a `.mcp.json` / `.cursor/mcp.json` /
# `.codex/config.toml` inside this repo (committed alongside the rest
# of the dev environment), so every clone gets the same MCP entry
# automatically — no per-developer setup required. User-authored
# entries in the same file are preserved via the
# `_jarvy_managed_servers` tracking list.
#
# `allow_custom_servers = false` keeps the library posture: only the
# built-in `jarvy` server registers. Remote-fetched configs would be
# refused at the trust boundary either way (see
# docs/mcp-registration.md).
# =============================================================================
[mcp_register]
agents = ["claude-code", "cursor", "codex"]
scope = "project"
allow_custom_servers = false

# =============================================================================
# Task runner — `jarvy run <name>` (or `jr <name>` after `jarvy shell-init`).
# Extra args pass through after `--`, e.g.:
#   jarvy run test -- config::            # one test filter
#   jarvy run new-tool -- mytool          # scaffold a tool
# Commands run from this file's directory (the repo root).
# =============================================================================
[commands]
build = "cargo build"
release = "cargo build --release"
check = "cargo check"
fmt = "cargo fmt --all"
fmt-check = "cargo fmt --all -- --check"
lint = "cargo clippy --all-features -- -D warnings"
# CI-equivalent test invocation (--all-features turns on test-bypass,
# so the loopback/redirected-home integration tests actually run).
test = "cargo test --all-features -- --show-output"
# Quicker local loop: lib tests only.
test-lib = "cargo test --lib"
# Installer script unit tests (checksum gate, channel filter, platform map).
test-install = "bash dist/scripts/tests/install_sh_test.sh"
# The full pre-push gate, same order CI runs it.
ci = "cargo fmt --all -- --check && cargo clippy --all-features -- -D warnings && cargo test --all-features -- --show-output"
# Scaffold a new tool: jarvy run new-tool -- <name>
new-tool = "cargo run -p cargo-jarvy -- new-tool"
