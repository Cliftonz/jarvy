# deny.toml - cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run with: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

# Advisory database configuration
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # quick-xml < 0.41 DoS advisories, pulled in via self_update 0.44's
    # archive-tar feature (self_update pins quick-xml 0.38.x; the patched
    # 0.41 only ships with the unreleased self_update 1.0 RCs). Jarvy's
    # exposure is nil in practice: we call only self_update::Move on
    # LOCAL files we downloaded + checksum/cosign-verified ourselves —
    # the quick-xml parse paths (XML from remote endpoints) never
    # execute. Revisit when self_update 1.0 stabilizes (tracked in the
    # security follow-up issue).
    { id = "RUSTSEC-2026-0194", reason = "quick-xml quadratic attr check — parse path unused by jarvy (Move-only usage of self_update)" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml NsReader allocation DoS — parse path unused by jarvy (Move-only usage of self_update)" },
]

# License configuration - compatible with MIT/Apache-2.0
# All licenses are denied unless explicitly allowed (deny-by-default)
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",  # Weak copyleft, file-level only
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",  # Required by aws-lc-sys (rustls dependency)
    "CDLA-Permissive-2.0",  # Required by webpki-roots (certificate store)
    # bzip2-specific permissive license; required by `libbz2-rs-sys`
    # (transitive from `zip` 8.6, our ticket-bundle ZIP writer).
    # https://spdx.org/licenses/bzip2-1.0.6.html — permissive, no
    # patent / copyleft concerns; comparable to BSD.
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

# Private registry handling
[licenses.private]
ignore = false
registries = []

# Crate exceptions (require justification comments)
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Crate banning and duplicate detection
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Skip specific versions (with justification)
skip = [
    # Example: { name = "syn", version = "1.0" } # Required by proc-macro-crate
]

# Skip tree (allow duplicates in specific dependency chains)
skip-tree = [
    # Example: { name = "windows-sys" } # Windows has complex version requirements
]

# Explicitly banned crates
deny = [
    # Ban OpenSSL in favor of rustls for security and auditability
    # { name = "openssl" },
    # { name = "openssl-sys" },
]

# Source repository restrictions
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# Organization-specific allowlist (if using private git repos)
[sources.allow-org]
# Example: github = ["my-org"]
