# Vale prose linter config
# https://vale.sh/docs/topics/config

StylesPath = .vale/styles
MinAlertLevel = suggestion

# Ignore code blocks, tables, and frontmatter.
[formats]
md = md

[*.md]
BasedOnStyles = Vale, write-good

# Tone these down — they're noisy in technical docs.
Vale.Spelling = NO
write-good.E-Prime = NO
write-good.TooWordy = NO
write-good.So = NO
write-good.Weasel = warning
write-good.Passive = NO
write-good.Illusions = warning
write-good.ThereIs = warning

# Skip auto-generated and template content.
[docs/cli-reference.md]
BasedOnStyles =

[docs/tools-registry.md]
BasedOnStyles =

[docs/changelog.md]
BasedOnStyles =

[docs/llms*.txt]
BasedOnStyles =
